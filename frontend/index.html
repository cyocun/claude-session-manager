  window.onerror = function(msg, src, line, col, err) {
    document.title = 'ERR:' + line + ':' + msg;
    var d = document.createElement('div');
    d.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:9999;background:red;color:white;padding:10px;font-size:12px;white-space:pre-wrap;';
    d.textContent = 'JS Error at line ' + line + ':\n' + msg + '\n' + (err ? err.stack : '');
    document.body ? document.body.prepend(d) : document.addEventListener('DOMContentLoaded', function(){ document.body.prepend(d); });
  };
  window.addEventListener('unhandledrejection', function(e) {
    document.title = 'REJECT:' + e.reason;
    var d = document.createElement('div');
    d.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:9999;background:orange;color:black;padding:10px;font-size:12px;white-space:pre-wrap;';
    d.textContent = 'Unhandled rejection:\n' + e.reason;
    document.body ? document.body.prepend(d) : document.addEventListener('DOMContentLoaded', function(){ document.body.prepend(d); });
  });
  </script>

    .session-tooltip {
      position: fixed; z-index: 200; pointer-events: none;
      padding: 4px 8px; border-radius: 4px; font-size: 11px;
      background: var(--modal-bg); border: 1px solid var(--modal-border);
      box-shadow: 0 2px 8px rgba(0,0,0,0.15); white-space: nowrap;
      color: var(--text-secondary);
    }
    .dark .session-tooltip { box-shadow: 0 2px 8px rgba(0,0,0,0.4); }
  </style>
</head>
<body class="h-screen" style="background:var(--bg);display:grid;grid-template-columns:1fr;grid-template-rows:1fr;">

  <!-- Left column: session list (iMessage style) -->
  <div id="sessionListPane" class="macos-sidebar" style="display:grid;grid-template-rows:auto auto 1fr;overflow:hidden;">
    <!-- Titlebar drag area -->
    <div data-tauri-drag-region class="titlebar-drag" style="height:38px;"></div>
    <!-- Search + new button -->
    <div class="px-3 pb-2" style="display:grid;grid-template-columns:1fr auto;gap:6px;align-items:center;">
      <input id="search" type="text" class="mac-input px-3" style="height:28px;">
      <button id="newSessionBtn" class="mac-btn" style="width:28px;height:28px;padding:0;" title="New Session">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M2 7.5h4.5m0 0H11m-4.5 0V3m0 4.5V12"/></svg>
      </button>
      <button id="archiveSelectedBtn" class="invisible mac-btn text-xs w-full" style="font-size:11px;grid-column:1/-1;">
        <span data-i18n="archiveSelected"></span>
      </button>
    </div>
    <!-- Session list -->
    <div class="overflow-y-auto scrollbar-thin px-2 pb-3" style="min-height:0;">
      <div id="sessionList" class="space-y-0.5"></div>
    </div>
    <!-- Hidden elements for state -->
    <input type="checkbox" id="showArchived" class="hidden">
    <h2 id="sessionListTitle" class="hidden"></h2>
  </div>

  <!-- Resize handle -->
  <div id="resizeHandle" class="resize-handle" style="display:none;"></div>

  <!-- Detail Pane -->
  <div id="detailPane" style="display:none;grid-template-rows:38px auto 1fr auto;min-width:0;height:100vh;overflow:hidden;">
    <div data-tauri-drag-region class="titlebar-drag" style="background:var(--bg-surface);"></div>
    <div id="detailHeader" class="px-4 pb-2" style="display:grid;grid-template-rows:auto auto;gap:6px;border-bottom:0.5px solid var(--border);background:var(--bg-surface);"></div>
    <div id="detailMessages" class="overflow-y-auto scrollbar-thin px-4 py-4" style="background:var(--bg-chat);display:grid;place-items:center;min-height:0;overflow-x:hidden;">
      <p id="emptyState" class="text-sm" style="color:var(--text-faint);" data-i18n="selectSession"></p>
    </div>
    <!-- Footer with action buttons -->
    <div id="detailFooter" class="p-4" style="display:grid;grid-auto-flow:column;grid-auto-columns:max-content;justify-content:end;gap:8px;align-items:center;border-top:0.5px solid var(--border);background:var(--bg-surface);"></div>
  </div>

  <!-- Toast -->
  <div id="toast" class="fixed bottom-6 right-6 rounded px-4 py-2 text-sm shadow-lg hidden fade-in"
    style="background:var(--toast-bg);border:1px solid var(--toast-border);color:var(--toast-text);"></div>


<script>
// --- i18n ---
const I18N = {
  ja: {
    searchPlaceholder: '検索...',
    chatSearchPlaceholder: '会話内を検索...',
    showArchived: 'アーカイブも表示',
    allProjects: 'すべてのプロジェクト',
    archiveSelected: '選択をアーカイブ',
    sessions: 'セッション',
    loading: '読み込み中...',
    resumeTerminal: 'Resume (Terminal)',
    resumeCopy: 'Resume (コピー)',
    copyCmd: 'コマンドをコピー',
    archive: 'アーカイブ',
    archived: 'archived',
    settings: '設定',
    theme: 'テーマ',
    themeSystem: 'システム設定に従う',
    themeLight: 'ライト',
    themeDark: 'ダーク',
    terminalApp: 'ターミナルアプリ',
    language: '言語',
    toastCopied: 'コマンドをコピーしました',
    toastArchived: 'アーカイブしました',
    toastArchivedN: '件をアーカイブしました',
    toastResumed: 'で再開しました',
    toastError: 'エラー: ',
    hits: '件',
    msg: 'msg',
    yesterday: '昨日',
    archiveProject: 'プロジェクトをアーカイブ',
    selectSession: 'セッションを選択してください',
  },
  en: {
    searchPlaceholder: 'Search...',
    chatSearchPlaceholder: 'Search in conversation...',
    showArchived: 'Show archived',
    allProjects: 'All Projects',
    archiveSelected: 'Archive selected',
    sessions: 'sessions',
    loading: 'Loading...',
    resumeTerminal: 'Resume (Terminal)',
    resumeCopy: 'Resume (Copy)',
    copyCmd: 'Copy command',
    archive: 'Archive',
    archived: 'archived',
    settings: 'Settings',
    theme: 'Theme',
    themeSystem: 'Follow system',
    themeLight: 'Light',
    themeDark: 'Dark',
    terminalApp: 'Terminal App',
    language: 'Language',
    toastCopied: 'Command copied',
    toastArchived: 'Archived',
    toastArchivedN: ' session(s) archived',
    toastResumed: ' resumed',
    toastError: 'Error: ',
    hits: ' hits',
    msg: 'msg',
    yesterday: 'Yesterday',
    archiveProject: 'Archive project',
    selectSession: 'Select a session',
  }
};

let lang = localStorage.getItem('csm-lang') || (navigator.language.startsWith('ja') ? 'ja' : 'en');
function t(key) { return I18N[lang]?.[key] || I18N.en[key] || key; }

function applyI18n() {
  document.querySelectorAll('[data-i18n]').forEach(el => {
    el.textContent = t(el.dataset.i18n);
  });
  document.querySelectorAll('[data-i18n-option]').forEach(el => {
    el.textContent = t(el.dataset.i18nOption);
  });
  document.getElementById('search').placeholder = t('searchPlaceholder');
  const cs = document.getElementById('chatSearch');
  if (cs) cs.placeholder = t('chatSearchPlaceholder');
  document.getElementById('newSessionBtn').title = lang === 'ja' ? '新規セッション' : 'New Session';
}

// --- Theme ---
let themePref = localStorage.getItem('csm-theme') || 'system';

function applyTheme() {
  let dark;
  if (themePref === 'dark') dark = true;
  else if (themePref === 'light') dark = false;
  else dark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  document.documentElement.classList.toggle('dark', dark);
  document.getElementById('hljs-theme-dark').disabled = !dark;
  document.getElementById('hljs-theme-light').disabled = dark;
}

window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
  if (themePref === 'system') applyTheme();
});

// --- Markdown ---
const md = window.markdownit({
  html: false, breaks: true, linkify: true,
  highlight: function(str, lang) {
    if (lang && hljs.getLanguage(lang)) {
      try { return hljs.highlight(str, { language: lang }).value; } catch {}
    }
    try { return hljs.highlightAuto(str).value; } catch {}
    return '';
  }
});
function renderMarkdown(text) { return DOMPurify.sanitize(md.render(text)); }

// --- State ---
// Tauri invoke bridge
const _isTauri = !!window.__TAURI__;
async function invoke(cmd, args = {}) {
  if (!_isTauri) { console.error('No Tauri', cmd); return null; }
  try { return await window.__TAURI__.core.invoke(cmd, args); }
  catch (e) { console.error('invoke error:', cmd, e); return null; }
}
let sessions = [];
let projects = [];
let selectedProject = null;
let selectedSession = null;
let selectedIds = new Set();
let serverSettings = {};
let projectNameMap = {}; // path -> display name
// Stores projects the user has explicitly toggled open/closed
let toggledProjects = new Set(JSON.parse(localStorage.getItem('csm-toggled') || '[]'));
// Stores projects where "show older" has been clicked
let showAllSessions = new Set();
let openedAt = Date.now();
let knownTimestamps = {}; // sessionId -> lastTimestamp at first load
let isFirstLoad = true;

function createEl(tag, attrs = {}, children = []) {
  const el = document.createElement(tag);
  for (const [k, v] of Object.entries(attrs)) {
    if (k === 'className') el.className = v;
    else if (k === 'textContent') el.textContent = v;
    else if (k.startsWith('on')) el.addEventListener(k.slice(2).toLowerCase(), v);
    else el.setAttribute(k, v);
  }
  for (const child of children) {
    if (typeof child === 'string') el.appendChild(document.createTextNode(child));
    else if (child) el.appendChild(child);
  }
  return el;
}

async function fetchSessions(includeArchived = false) {
  sessions = await invoke('list_sessions', { includeArchived }) || [];
  if (isFirstLoad) {
    sessions.forEach(s => { knownTimestamps[s.sessionId] = s.lastTimestamp; });
    isFirstLoad = false;
  }
  renderSessions();
}
function isUpdatedSession(s) {
  if (!(s.sessionId in knownTimestamps)) return true; // new session
  return s.lastTimestamp > knownTimestamps[s.sessionId]; // timestamp changed
}
async function fetchProjects() {
  projects = await invoke('list_projects') || [];
  projectNameMap = {};
  projects.forEach(p => { if (p.name) projectNameMap[p.path] = p.name; });
  renderProjects();
}
async function fetchDetail(sessionId) {
  return await invoke('get_session_detail', { sessionId });
}
async function fetchSettings() {
  serverSettings = await invoke('get_settings') || {};
}

function shortPath(p) {
  return p.replace(/^\/Users\/[^/]+\//, '~/').replace(/^~\/Dropbox\/__WORKS\//, '');
}
function shortPathElements(p) {
  const short = shortPath(p);
  const lastSlash = short.lastIndexOf('/');
  if (lastSlash === -1) return [null, short];
  return [short.slice(0, lastSlash + 1), short.slice(lastSlash + 1)];
}
function projectDisplayName(path) {
  return projectNameMap[path] || shortPath(path).split('/').pop() || shortPath(path);
}
function isRemote() {
  return location.hostname !== 'localhost' && location.hostname !== '127.0.0.1';
}
function copyText(text) {
  if (navigator.clipboard?.writeText) {
    return navigator.clipboard.writeText(text).catch(() => copyTextFallback(text));
  }
  return copyTextFallback(text);
}
function copyTextFallback(text) {
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.cssText = 'position:fixed;left:-9999px';
  document.body.appendChild(ta);
  ta.select();
  document.execCommand('copy');
  document.body.removeChild(ta);
}
function timeAgo(ts) {
  if (!ts) return '';
  const now = new Date();
  const date = new Date(ts);
  const locale = lang === 'ja' ? 'ja-JP' : 'en-US';
  const startOfToday = new Date(now.getFullYear(), now.getMonth(), now.getDate()).getTime();
  const startOfYesterday = startOfToday - 86400000;
  const daysSinceMonday = (now.getDay() + 6) % 7;
  const startOfWeek = startOfToday - daysSinceMonday * 86400000;
  if (ts >= startOfToday) return date.toLocaleTimeString(locale, { hour: '2-digit', minute: '2-digit' });
  if (ts >= startOfYesterday) return t('yesterday');
  if (ts >= startOfWeek) return date.toLocaleDateString(locale, { weekday: lang === 'ja' ? 'short' : 'long' });
  if (date.getFullYear() === now.getFullYear()) return date.toLocaleDateString(locale, { month: lang === 'ja' ? 'numeric' : 'short', day: 'numeric' });
  return date.toLocaleDateString(locale, { year: 'numeric', month: lang === 'ja' ? 'numeric' : 'short', day: 'numeric' });
}

// --- Rendering ---

function renderProjects() {
  // Projects are now only used for display name mapping, no sidebar rendering
  projectNameMap = {};
  projects.forEach(p => { if (p.name) projectNameMap[p.path] = p.name; });
}

const SEVEN_DAYS = 7 * 24 * 60 * 60 * 1000;

function isRecentProject(g) {
  return (Date.now() - g.sessions[0].lastTimestamp) < SEVEN_DAYS;
}

function isProjectOpen(g) {
  // User explicitly toggled -> respect that
  if (toggledProjects.has(g.path)) {
    // toggled means: flip the default
    // default open = recent, default closed = old
    return !isRecentProject(g);
  }
  // Default: open if recent
  return isRecentProject(g);
}

function saveToggled() {
  localStorage.setItem('csm-toggled', JSON.stringify([...toggledProjects]));
}

function renderSessionItem(s) {
  const cb = createEl('input', {
    type: 'checkbox',
    className: 'session-check mac-check mt-1 flex-shrink-0',
    'data-id': s.sessionId,
    onChange: (e) => {
      if (e.target.checked) selectedIds.add(s.sessionId);
      else selectedIds.delete(s.sessionId);
      const ab = document.getElementById('archiveSelectedBtn');
      ab.classList.toggle('invisible', selectedIds.size === 0);
      ab.classList.toggle('visible', selectedIds.size > 0);
    }
  });
  if (selectedIds.has(s.sessionId)) cb.checked = true;

  const firstMsg = createEl('p', { className: 'text-sm leading-snug truncate', textContent: s.firstDisplay });
  firstMsg.style.color = 'var(--text)';
  const lastMsg = (s.lastDisplay && s.lastDisplay !== s.firstDisplay)
    ? createEl('p', { className: 'text-xs leading-snug truncate mt-0.5', textContent: s.lastDisplay })
    : null;
  if (lastMsg) lastMsg.style.color = 'var(--text-muted)';

  const dot = () => { const sp = createEl('span', { className: 'text-[10px] flex-shrink-0', textContent: '·' }); sp.style.color = 'var(--text-dot)'; return sp; };
  const meta = (txt) => { const sp = createEl('span', { className: 'text-[10px] flex-shrink-0', textContent: txt }); sp.style.color = 'var(--text-faint)'; return sp; };
  const metaParts = [meta(timeAgo(s.lastTimestamp)), dot(), meta(s.messageCount + t('msg'))];
  if (s.archived) { const sp = createEl('span', { className: 'text-[10px] flex-shrink-0', textContent: t('archived') }); sp.style.color = 'var(--text-faint)'; metaParts.push(sp); }

  const updated = isUpdatedSession(s);

  const metaDiv = createEl('div', { className: 'mt-1 overflow-hidden' }, metaParts);
  metaDiv.style.cssText = 'display:grid;grid-auto-flow:column;grid-auto-columns:max-content;align-items:center;gap:8px;';
  const textDiv = createEl('div', { className: 'min-w-0 overflow-hidden' }, [firstMsg, lastMsg, metaDiv].filter(Boolean));

  const rowChildren = [cb];
  if (updated) {
    const updDot = createEl('span', { className: 'flex-shrink-0 mt-1.5' });
    updDot.style.cssText = 'width:7px;height:7px;border-radius:50%;background:var(--updated-dot);';
    rowChildren.push(updDot);
  }
  rowChildren.push(textDiv);
  const row = createEl('div', { className: 'overflow-hidden' }, rowChildren);
  row.style.cssText = 'display:grid;grid-template-columns:' + (updated ? 'auto auto 1fr' : 'auto 1fr') + ';align-items:start;gap:8px;';

  const isActive = selectedSession === s.sessionId;
  const defaultBg = updated ? 'var(--updated-bg)' : 'transparent';
  const item = createEl('div', {
    className: 'session-item p-3 rounded cursor-default transition border overflow-hidden',
    'data-id': s.sessionId,
    onClick: (e) => {
      if (e.target.tagName === 'INPUT') return;
      clearTimeout(previewTimer);
      hidePreview();
      // Deselect previous
      const prev = document.querySelector('.session-item-active');
      if (prev) {
        prev.classList.remove('session-item-active');
        prev.style.borderColor = 'transparent';
        prev.style.background = '';
      }
      selectedSession = s.sessionId;
      knownTimestamps[s.sessionId] = s.lastTimestamp;
      // Select current
      item.classList.add('session-item-active');
      item.style.borderColor = 'var(--item-active-border)';
      item.style.background = 'var(--item-active)';
      showDetail(s.sessionId);
    }
  }, [row]);
  if (isActive) item.classList.add('session-item-active');
  item.style.borderColor = isActive ? 'var(--item-active-border)' : 'transparent';
  item.style.background = isActive ? 'var(--item-active)' : defaultBg;
  if (s.archived) item.style.opacity = '0.4';
  // Tooltip with date
  const dateStr = s.lastTimestamp ? new Date(s.lastTimestamp).toLocaleString(lang === 'ja' ? 'ja-JP' : 'en-US') : '';
  item.title = dateStr;

  item.addEventListener('mouseenter', () => {
    if (!isActive) item.style.background = 'var(--item-hover)';
    clearTimeout(previewTimer);
    if (!isActive) {
      previewTimer = setTimeout(() => {
        showPreview(s.sessionId, item.getBoundingClientRect());
      }, 150);
    }
  });
  item.addEventListener('mouseleave', () => {
    if (!isActive) item.style.background = defaultBg;
    clearTimeout(previewTimer);
    previewTimer = setTimeout(hidePreview, 200);
  });
  return item;
}

function renderSessions() {
  const search = document.getElementById('search').value.toLowerCase();
  let filtered = sessions;
  if (selectedProject) filtered = filtered.filter(s => s.project === selectedProject);
  if (search) filtered = filtered.filter(s =>
    (s.firstDisplay || '').toLowerCase().includes(search) ||
    (s.lastDisplay || '').toLowerCase().includes(search) ||
    s.project.toLowerCase().includes(search) ||
    (projectNameMap[s.project] || '').toLowerCase().includes(search)
  );

  document.getElementById('sessionListTitle').textContent =
    filtered.length + ' ' + t('sessions') + (selectedProject ? ' — ' + projectDisplayName(selectedProject) : '');

  const archBtn = document.getElementById('archiveSelectedBtn');
  archBtn.classList.toggle('invisible', selectedIds.size === 0);
  archBtn.classList.toggle('visible', selectedIds.size > 0);

  const el = document.getElementById('sessionList');
  el.replaceChildren();

  // When a specific project is selected, render flat list
  if (selectedProject) {
    filtered.forEach(s => el.appendChild(renderSessionItem(s)));
    return;
  }

  // Group by project
  const groups = [];
  const groupMap = {};
  filtered.forEach(s => {
    if (!groupMap[s.project]) {
      groupMap[s.project] = { path: s.project, sessions: [] };
      groups.push(groupMap[s.project]);
    }
    groupMap[s.project].sessions.push(s);
  });

  groups.forEach(g => {
    const open = isProjectOpen(g);
    const group = createEl('div', { className: 'project-group' });

    // Group header
    const chevron = createEl('span', { className: 'project-group-chevron' + (open ? ' open' : ''), textContent: '\u25B6' });
    const name = createEl('span', { className: 'text-xs font-medium flex-1 truncate', textContent: projectDisplayName(g.path) });
    name.style.color = 'var(--text-secondary)';
    const count = createEl('span', { className: 'text-[10px] flex-shrink-0', textContent: g.sessions.length + '' });
    count.style.color = 'var(--text-muted)';

    const icon = createEl('span', { className: 'project-group-icon' });
    icon.innerHTML = '<svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"><path d="M2 4.5A1.5 1.5 0 013.5 3H6l1.5 2h5A1.5 1.5 0 0114 6.5v5a1.5 1.5 0 01-1.5 1.5h-9A1.5 1.5 0 012 11.5z"/></svg>';
    const header = createEl('div', { className: 'project-group-header' }, [chevron, icon, name, count]);
    if (projectNameMap[g.path]) header.title = shortPath(g.path);

    // Split sessions into recent (7 days) and older
    const now = Date.now();
    const recentSessions = g.sessions.filter(s => (now - s.lastTimestamp) < SEVEN_DAYS);
    const olderSessions = g.sessions.filter(s => (now - s.lastTimestamp) >= SEVEN_DAYS);

    const sessionsDiv = createEl('div', { className: 'project-group-sessions' + (open ? ' open' : '') });

    recentSessions.forEach(s => sessionsDiv.appendChild(renderSessionItem(s)));

    if (olderSessions.length > 0) {
      if (showAllSessions.has(g.path)) {
        olderSessions.forEach(s => sessionsDiv.appendChild(renderSessionItem(s)));
      } else {
        const showOlderBtn = createEl('button', {
          className: 'show-older-pill',
          textContent: (lang === 'ja' ? '古いセッションを表示' : 'Show older') + ' (' + olderSessions.length + ')',
          onClick: (e) => {
            e.stopPropagation();
            showAllSessions.add(g.path);
            renderSessions();
          }
        });
        sessionsDiv.appendChild(showOlderBtn);
      }
    }

    if (recentSessions.length === 0 && !showAllSessions.has(g.path)) {
      const hint = createEl('p', { className: 'text-[11px] px-3 py-1.5', textContent: lang === 'ja' ? '最近のセッションなし' : 'No recent sessions' });
      hint.style.color = 'var(--text-faint)';
      sessionsDiv.insertBefore(hint, sessionsDiv.firstChild);
    }

    header.addEventListener('click', (e) => {
      if (e.metaKey || e.ctrlKey) {
        const allChevrons = document.querySelectorAll('.project-group-chevron');
        const allSessions = document.querySelectorAll('.project-group-sessions');
        const shouldOpen = !chevron.classList.contains('open');
        allChevrons.forEach(c => c.classList.toggle('open', shouldOpen));
        allSessions.forEach(s => s.classList.toggle('open', shouldOpen));
        toggledProjects.clear();
        if (!shouldOpen) {
          groups.forEach(gg => { if (isRecentProject(gg)) toggledProjects.add(gg.path); });
        } else {
          groups.forEach(gg => { if (!isRecentProject(gg)) toggledProjects.add(gg.path); });
        }
        saveToggled();
        return;
      }
      if (toggledProjects.has(g.path)) toggledProjects.delete(g.path);
      else toggledProjects.add(g.path);
      saveToggled();
      chevron.classList.toggle('open');
      sessionsDiv.classList.toggle('open');
    });

    group.appendChild(header);
    group.appendChild(sessionsDiv);
    el.appendChild(group);
  });
}

async function showDetail(sessionId) {
  const pane = document.getElementById('detailPane');
  const headerEl = document.getElementById('detailHeader');
  const messagesEl = document.getElementById('detailMessages');

  // Switch to 3-column layout
  document.body.style.gridTemplateColumns = '300px 1px 1fr';
  document.getElementById('resizeHandle').style.display = '';
  pane.style.display = 'grid';

  // Switch from grid centering (empty state) to block for scrollable content
  messagesEl.style.display = 'block';
  messagesEl.replaceChildren();
  messagesEl.scrollTop = 0;
  chatHits = []; chatHitIndex = -1;
  hidePreview();

  const detail = previewCache[sessionId] || await fetchDetail(sessionId);
  previewCache[sessionId] = detail;

  const sessionSummary = sessions.find(s => s.sessionId === sessionId);
  const projectName = projectDisplayName(detail.project);
  const sessionTitle = sessionSummary ? sessionSummary.firstDisplay : '';

  const pathLine = createEl('span', { className: 'text-xs' });
  pathLine.style.cssText = 'overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0;';
  const projSpan = createEl('span', { className: 'font-medium', textContent: projectName });
  projSpan.style.color = 'var(--text-secondary)';
  pathLine.appendChild(projSpan);
  if (sessionTitle) {
    const sep = createEl('span', { textContent: ' — ' });
    sep.style.color = 'var(--text-faint)';
    pathLine.appendChild(sep);
    const titleSpan = createEl('span', { textContent: sessionTitle });
    titleSpan.style.color = 'var(--text-muted)';
    pathLine.appendChild(titleSpan);
  }
  pathLine.title = shortPath(detail.project) + ' · ' + sessionId;


  const mkBtn = (text, isPrimary, onClick) => {
    const btn = createEl('button', {
      className: 'mac-btn flex-shrink-0' + (isPrimary ? ' mac-btn-primary' : ''),
      textContent: text, onClick
    });
    return btn;
  };

  // Chat search — macOS-style with count and nav inside the field
  const chatSearchInput = createEl('input', {
    type: 'text', id: 'chatSearch',
    className: 'mac-input',
  });

  );

  const archiveBtn = mkBtn(t('archive'), false, () => archiveSingle(sessionId));
  footerEl.replaceChildren(resumeOpenBtn, resumeCopyBtn, archiveBtn);

  // Chat messages — lazy rendering with IntersectionObserver
  messagesEl.replaceChildren();
  const chatContainer = createEl('div', {});
  chatContainer.style.cssText = 'display:grid;gap:12px;';

  // Build a global result map across all messages
  const globalResultMap = {};
  detail.messages.forEach(m => {
    if (m.tools) {
      m.tools.filter(t => t.name === '_result').forEach(t => { globalResultMap[t.id] = t; });
    }
  });

  // Prepare message descriptors (lightweight) without rendering
  const msgDescs = [];
  detail.messages.forEach(m => {
    const hasText = m.content && m.content !== '[Tool Result]' && !m.content.startsWith('[Tool:');
    const hasTools = m.tools && m.tools.length > 0;
    if (!hasText && !hasTools) return;
    msgDescs.push({ msg: m, hasText, hasTools });
  });

  // Render a single message descriptor into DOM elements
  function renderMsgDesc(desc) {
    const { msg: m, hasText, hasTools } = desc;
    const isUser = m.type === 'user';
    const els = [];

    if (hasTools) {
      const toolEls = renderToolBlocks(m.tools, globalResultMap);
      if (toolEls.length > 0) {
        if (hasText) {
          const bubbleInner = createEl('div', { className: 'md-content text-sm leading-relaxed break-words' });
          bubbleInner.innerHTML = renderMarkdown(m.content);
          const bubble = createEl('div', { className: (isUser ? 'bubble-user' : 'bubble-assistant') + ' px-4 py-2.5' }, [bubbleInner]);
          bubble.style.justifySelf = isUser ? 'end' : 'start';
          els.push(bubble);
        }
        toolEls.forEach(te => els.push(te));
        return els;
      }
    }

    if (!hasText) return els;

    const bubbleInner = createEl('div', { className: 'md-content text-sm leading-relaxed break-words' });
    bubbleInner.innerHTML = renderMarkdown(m.content);
    const bubble = createEl('div', { className: (isUser ? 'bubble-user' : 'bubble-assistant') + ' px-4 py-2.5' }, [bubbleInner]);
    bubble.style.justifySelf = isUser ? 'end' : 'start';
    els.push(bubble);
    return els;
  }

  // Create placeholders and lazily render with IntersectionObserver
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (!entry.isIntersecting) return;
      const placeholder = entry.target;
      const idx = parseInt(placeholder.dataset.idx);
      observer.unobserve(placeholder);
      const els = renderMsgDesc(msgDescs[idx]);
      placeholder.replaceWith(...els);
    });
  }, { root: messagesEl, rootMargin: '200px' });

  // Render last ~10 messages immediately (visible on scroll-to-bottom), rest as placeholders
  const immediateCount = Math.min(10, msgDescs.length);
  const lazyCount = msgDescs.length - immediateCount;

  for (let i = 0; i < lazyCount; i++) {
    const ph = createEl('div', { 'data-idx': String(i) });
    ph.style.minHeight = '32px';
    chatContainer.appendChild(ph);
    observer.observe(ph);
  }

  for (let i = lazyCount; i < msgDescs.length; i++) {
    const els = renderMsgDesc(msgDescs[i]);
    els.forEach(el => chatContainer.appendChild(el));
  }

  messagesEl.appendChild(chatContainer);
  const spacer = createEl('div', {});
  spacer.style.height = '24px';
  messagesEl.appendChild(spacer);
  requestAnimationFrame(() => { messagesEl.scrollTop = messagesEl.scrollHeight; });
}

const previewCache = {};
let previewEl = null;
let previewTimer = null;
let previewSessionId = null;

function initPreview() {
  previewEl = document.createElement('div');
  previewEl.className = 'session-preview hidden';
  previewEl.addEventListener('mouseenter', () => clearTimeout(previewTimer));
  previewEl.addEventListener('mouseleave', () => { previewTimer = setTimeout(hidePreview, 200); });
  document.body.appendChild(previewEl);
}

let previewAnchorRect = null;

function positionPreview() {
  if (!previewAnchorRect) return;
  const listPane = document.getElementById('sessionListPane');
  const x = listPane.getBoundingClientRect().right + 12;
  previewEl.style.left = Math.max(10, Math.min(x, window.innerWidth - 420)) + 'px';
  // Temporarily position off-screen to measure actual height
  previewEl.style.top = '0px';
  previewEl.style.visibility = 'hidden';
  const actualH = previewEl.offsetHeight;
  previewEl.style.visibility = '';
  // Center vertically, then clamp to viewport
  const anchorMid = previewAnchorRect.top + previewAnchorRect.height / 2;
  const finalY = Math.max(10, Math.min(anchorMid - actualH / 2, window.innerHeight - actualH - 10));
  previewEl.style.top = finalY + 'px';
  // Arrow points at the hovered item, clamped to popover bounds
  const arrowTop = Math.max(20, Math.min(anchorMid - finalY, actualH - 20));
  previewEl.style.setProperty('--arrow-top', arrowTop + 'px');
}

function showPreview(sessionId, anchorRect) {
  if (previewSessionId === sessionId && !previewEl.classList.contains('hidden')) return;
  if (!anchorRect || (anchorRect.right === 0 && anchorRect.top === 0)) return;
  previewSessionId = sessionId;
  previewAnchorRect = anchorRect;

  if (previewCache[sessionId]) {
    renderPreview(previewCache[sessionId]);
    return;
  }

  previewEl.classList.remove('hidden');
  const loadingInner = createEl('div', { className: 'session-preview-inner' });
  loadingInner.appendChild(createEl('span', { className: 'text-xs', textContent: '...' }));
  previewEl.replaceChildren(loadingInner);
  positionPreview();

  invoke('get_session_detail', { sessionId }).then(detail => {
    previewCache[sessionId] = detail;
    if (previewSessionId === sessionId) renderPreview(detail);
  });
}

function renderPreview(detail) {
  previewEl.classList.remove('hidden');
  const inner = document.createElement('div');
  inner.className = 'session-preview-inner';

  // Show last ~20 meaningful messages (preview is 90vh)
  const msgs = detail.messages.filter(m =>
    m.content && m.content !== '[Tool Result]' && !m.content.startsWith('[Tool:')
  );
  const recent = msgs.slice(-20);

  recent.forEach(m => {
    const isUser = m.type === 'user';
    const div = document.createElement('div');
    div.className = 'preview-msg ' + (isUser ? 'preview-user' : 'preview-assistant');
    div.textContent = m.content.slice(0, 120) + (m.content.length > 120 ? '...' : '');
    inner.appendChild(div);
  });

  previewEl.replaceChildren(inner);
  positionPreview();
  inner.scrollTop = inner.scrollHeight;
}

function hidePreview() {
  previewSessionId = null;
  if (previewEl) previewEl.classList.add('hidden');
}

// --- Tool rendering ---

function guessLang(filePath) {
  if (!filePath) return null;
  const ext = filePath.split('.').pop().toLowerCase();
  const map = {
    js: 'javascript', jsx: 'javascript', ts: 'typescript', tsx: 'typescript',
    py: 'python', rb: 'ruby', rs: 'rust', go: 'go', java: 'java',
    css: 'css', scss: 'css', html: 'xml', htm: 'xml', vue: 'xml', svelte: 'xml',
    json: 'json', yaml: 'yaml', yml: 'yaml', toml: 'ini',
    sh: 'bash', zsh: 'bash', bash: 'bash',
    sql: 'sql', md: 'markdown', swift: 'swift', kt: 'kotlin',
  };
  return map[ext] || null;
}

function highlightCode(text, lang) {
  if (lang && hljs.getLanguage(lang)) {
    try { return hljs.highlight(text, { language: lang }).value; } catch {}
  }
  try { return hljs.highlightAuto(text).value; } catch {}
  return null;
}

function makeHighlightedPre(text, lang) {
  const pre = document.createElement('pre');
  const code = document.createElement('code');
  code.className = 'hljs' + (lang ? ' language-' + lang : '');
  const highlighted = highlightCode(text, lang);
  if (highlighted) {
    code.innerHTML = DOMPurify.sanitize(highlighted);
  } else {
    code.textContent = text;
  }
  pre.appendChild(code);
  return pre;
}

function renderToolBlocks(tools, externalResultMap) {
  const els = [];
  // Merge local results (same message) and external results (from next user message)
  const resultMap = { ...(externalResultMap || {}) };
  tools.filter(t => t.name === '_result').forEach(t => { resultMap[t.id] = t; });

  tools.filter(t => t.name !== '_result').forEach(tool => {
    const result = resultMap[tool.id];
    const block = document.createElement('div');
    block.className = 'tool-block';

    let summary = '';
    let bodyEl = null;
    let isDiff = false;
    let diffFile = '', diffOld = '', diffNew = '';
    let lang = null;

    if (tool.name === 'Bash') {
      summary = tool.description || tool.command || '(bash)';
      if (tool.command) bodyEl = makeHighlightedPre('$ ' + tool.command, 'bash');
    } else if (tool.name === 'Edit') {
      const fname = (tool.file || '').split('/').pop();
      summary = 'Edit ' + fname;
      isDiff = true;
      diffFile = tool.file || fname;
      diffOld = tool.old || '';
      diffNew = tool.new || '';
    } else if (tool.name === 'Write') {
      const fname = (tool.file || '').split('/').pop();
      summary = 'Write ' + fname;
      lang = guessLang(tool.file);
      bodyEl = makeHighlightedPre(tool.content || '', lang);
    } else if (tool.name === 'Read') {
      const fname = (tool.file || '').split('/').pop();
      summary = 'Read ' + fname;
    } else if (tool.name === 'Glob' || tool.name === 'Grep') {
      summary = tool.name + ' ' + (tool.pattern || '');
    } else {
      summary = tool.name;
      if (tool.input) bodyEl = makeHighlightedPre(JSON.stringify(tool.input, null, 2), 'json');
    }

    // Header
    const icon = toolIcon(tool.name);
    const chevron = createEl('span', { className: 'tool-chevron', textContent: '\u25B6' });
    const label = createEl('span', { className: 'tool-label', textContent: tool.name });
    const desc = createEl('span', { className: 'tool-desc', textContent: summary });
    const header = createEl('div', { className: 'tool-header' }, [chevron, icon, label, desc]);

    // Body
    const body = document.createElement('div');
    body.className = 'tool-body';
    let hasBody = false;

    if (isDiff) {
      const unifiedPatch = Diff.createPatch(diffFile, diffOld, diffNew, '', '', { context: 3 });
      const diffContainer = document.createElement('div');
      const outputType = 'side-by-side';
      const diffHtml = Diff2Html.html(unifiedPatch, {
        drawFileList: false,
        outputFormat: outputType,
        matching: 'words',
        highlight: true,
      });
      diffContainer.innerHTML = DOMPurify.sanitize(diffHtml);
      body.appendChild(diffContainer);
      hasBody = true;
    } else if (bodyEl) {
      body.appendChild(bodyEl);
      hasBody = true;
    }

    if (result && result.output) {
      if (hasBody) {
        const sep = document.createElement('hr');
        sep.style.cssText = 'border:none;border-top:1px solid var(--code-border);margin:4px 0;';
        body.appendChild(sep);
      }
      const outputPre = makeHighlightedPre(result.output, 'bash');
      outputPre.className += ' tool-result-output';
      body.appendChild(outputPre);
      hasBody = true;
    }

    header.addEventListener('click', () => {
      chevron.classList.toggle('open');
      body.classList.toggle('open');
    });

    block.appendChild(header);
    if (hasBody) block.appendChild(body);
    els.push(block);
  });
  return els;
}

// --- Chat search ---

let chatHits = [];
let chatHitIndex = -1;

function doChatSearch() {
  const q = document.getElementById('chatSearch').value.trim();
  const countEl = document.getElementById('chatSearchCount');
  const messagesEl = document.getElementById('detailMessages');
  messagesEl.querySelectorAll('mark.chat-hit').forEach(m => {
    const parent = m.parentNode; parent.replaceChild(document.createTextNode(m.textContent), m); parent.normalize();
  });
  chatHits = []; chatHitIndex = -1;
  const prevEl = document.getElementById('chatSearchPrev');
  const nextEl = document.getElementById('chatSearchNext');
  if (!q) { countEl.textContent = ''; prevEl.classList.add('hidden'); nextEl.classList.add('hidden'); return; }

  const walker = document.createTreeWalker(messagesEl, NodeFilter.SHOW_TEXT);
  const matches = [];
  let node;
  while (node = walker.nextNode()) {
    const text = node.textContent; const lower = text.toLowerCase(); const qLower = q.toLowerCase();
    let idx = 0;
    while ((idx = lower.indexOf(qLower, idx)) !== -1) { matches.push({ node, start: idx, length: q.length }); idx += q.length; }
  }
  for (let i = matches.length - 1; i >= 0; i--) {
    const m = matches[i]; const range = document.createRange();
    range.setStart(m.node, m.start); range.setEnd(m.node, m.start + m.length);
    const mark = document.createElement('mark'); mark.className = 'chat-hit'; range.surroundContents(mark);
  }
  chatHits = Array.from(messagesEl.querySelectorAll('mark.chat-hit'));
  countEl.textContent = chatHits.length ? chatHits.length + t('hits') : '0' + t('hits');
  // Show nav buttons only when multiple hits
  if (chatHits.length > 1) { prevEl.classList.remove('hidden'); nextEl.classList.remove('hidden'); }
  else { prevEl.classList.add('hidden'); nextEl.classList.add('hidden'); }
  if (chatHits.length > 0) { chatHitIndex = 0; activateChatHit(); }
}
function activateChatHit() {
  chatHits.forEach(h => h.classList.remove('chat-hit-active'));
  if (chatHitIndex >= 0 && chatHitIndex < chatHits.length) {
    const hit = chatHits[chatHitIndex]; hit.classList.add('chat-hit-active'); smoothScrollTo(hit);
    document.getElementById('chatSearchCount').textContent = (chatHitIndex + 1) + '/' + chatHits.length;
  }
}
function smoothScrollTo(el) {
  const container = document.getElementById('detailMessages');
  const target = el.offsetTop - container.offsetTop - container.clientHeight / 2 + el.clientHeight / 2;
  const start = container.scrollTop; const distance = target - start; const duration = 200;
  let startTime = null;
  function step(timestamp) {
    if (!startTime) startTime = timestamp;
    const progress = Math.min((timestamp - startTime) / duration, 1);
    const ease = 1 - Math.pow(1 - progress, 3);
    container.scrollTop = start + distance * ease;
    if (progress < 1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}
function chatSearchNext() { if (!chatHits.length) return; chatHitIndex = (chatHitIndex + 1) % chatHits.length; activateChatHit(); }
function chatSearchPrev() { if (!chatHits.length) return; chatHitIndex = (chatHitIndex - 1 + chatHits.length) % chatHits.length; activateChatHit(); }

(function() {

    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';

  document.addEventListener('mousemove', (e) => {

    const newW = e.clientX;
    const clamped = Math.max(220, Math.min(500, newW));
    document.body.style.gridTemplateColumns = clamped + 'px 1px 1fr';
  });

  document.addEventListener('mouseup', () => {
    if (!dragging) return;
    dragging = false;
    handle.classList.remove('active');
    document.body.style.cursor = '';
    document.body.style.userSelect = '';
  });
})();

  listen('menu-show-archived', (e) => {
    document.getElementById('showArchived').checked = e.payload;
    fetchSessions(e.payload);
  });
  listen('menu-zoom', (e) => {
    if (e.payload === 'in') { zoomLevel = Math.min(200, zoomLevel + 10); }
    else if (e.payload === 'out') { zoomLevel = Math.max(60, zoomLevel - 10); }
    else { zoomLevel = 100; }
    localStorage.setItem('csm-zoom', zoomLevel); applyZoom();
  });
}

// --- Zoom ---
let zoomLevel = parseFloat(localStorage.getItem('csm-zoom') || '100');
function applyZoom() {
  document.getElementById('detailPane').style.fontSize = zoomLevel + '%';
}

// --- Keyboard navigation ---
let focusPane = 'left'; // 'left' or 'right'
let focusedBubbleIdx = -1;

document.getElementById('sessionListPane').addEventListener('click', () => { focusPane = 'left'; clearBubbleFocus(); });
document.getElementById('detailPane').addEventListener('click', () => { if (selectedSession) focusPane = 'right'; });

function clearBubbleFocus() {
  const prev = document.querySelector('.bubble-focused');
  if (prev) { prev.classList.remove('bubble-focused'); prev.style.outline = ''; }
  focusedBubbleIdx = -1;
}

function getBubbles() {
  return Array.from(document.querySelectorAll('#detailMessages .bubble-user, #detailMessages .bubble-assistant'));
}

function focusBubble(idx) {
  const bubbles = getBubbles();
  if (bubbles.length === 0) return;
  clearBubbleFocus();
  focusedBubbleIdx = Math.max(0, Math.min(idx, bubbles.length - 1));
  const b = bubbles[focusedBubbleIdx];
  b.classList.add('bubble-focused');
  b.style.outline = '2px solid var(--accent)';
  b.style.outlineOffset = '2px';
  b.style.borderRadius && (b.style.outlineOffset = '2px');
  b.scrollIntoView({ block: 'nearest' });
}

document.addEventListener('keydown', (e) => {
  if (e.metaKey || e.ctrlKey || e.altKey) return;
  const active = document.activeElement;
  if (active && (active.tagName === 'INPUT' || active.tagName === 'TEXTAREA')) return;

  if (e.key === 'ArrowDown' || e.key === 'ArrowUp') {
    e.preventDefault();
    if (focusPane === 'right' && selectedSession) {
      const bubbles = getBubbles();
      if (bubbles.length === 0) return;
      if (e.key === 'ArrowDown') {
        focusBubble(focusedBubbleIdx < 0 ? 0 : focusedBubbleIdx + 1);
      } else {
        focusBubble(focusedBubbleIdx < 0 ? bubbles.length - 1 : focusedBubbleIdx - 1);
      }
    } else {
      const items = Array.from(document.querySelectorAll('.session-item'));
      if (items.length === 0) return;
      const currentIdx = items.findIndex(el => el.dataset.id === selectedSession);
      let nextIdx;
      if (e.key === 'ArrowDown') {
        nextIdx = currentIdx < 0 ? 0 : Math.min(currentIdx + 1, items.length - 1);
      } else {
        nextIdx = currentIdx < 0 ? 0 : Math.max(currentIdx - 1, 0);
      }
      items[nextIdx].click();
      items[nextIdx].scrollIntoView({ block: 'nearest' });
    }
  }

  // Tab to switch panes
  if (e.key === 'Tab' && selectedSession) {
    e.preventDefault();
    if (focusPane === 'left') {
      focusPane = 'right';
    } else {
      focusPane = 'left';
      clearBubbleFocus();
    }
  }
});

applyTheme();
applyI18n();
initPreview();
applyZoom();

Promise.all([fetchSessions(), fetchProjects(), fetchSettings()]).then(() => {
  // Sync menu state with saved preferences
  invoke('sync_menu_state', {
    theme: themePref,
    terminal: serverSettings.terminalApp || 'Terminal',
    lang: lang,
    showArchived: false,
  });
});

// Auto-refresh every 30s to detect updated sessions
setInterval(() => {
  fetchSessions(document.getElementById('showArchived').checked);
}, 30000);
</script>
