<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Claude Sessions</title>
  <!-- Boot script applies theme/language class early to avoid initial flicker. -->
  <script src="js/boot.js"></script>
  <!-- Vendor runtime dependencies used by the TS-rendered UI. -->
  <link rel="stylesheet" href="vendor/tailwind.min.css">
  <script src="vendor/markdown-it.min.js"></script>
  <script src="vendor/purify.min.js"></script>
  <link rel="stylesheet" href="vendor/github-dark-dimmed.min.css" id="hljs-theme-dark">
  <link rel="stylesheet" href="vendor/hljs-github.min.css" id="hljs-theme-light">
  <script src="vendor/highlight.min.js"></script>
  <script src="vendor/hljs-bash.min.js"></script>
  <script src="vendor/hljs-diff.min.js"></script>
  <script src="vendor/hljs-json.min.js"></script>
  <script src="vendor/hljs-python.min.js"></script>
  <script src="vendor/hljs-javascript.min.js"></script>
  <script src="vendor/hljs-typescript.min.js"></script>
  <script src="vendor/hljs-css.min.js"></script>
  <script src="vendor/hljs-xml.min.js"></script>
  <script src="vendor/hljs-yaml.min.js"></script>
  <script src="vendor/hljs-sql.min.js"></script>
  <script src="vendor/diff.min.js"></script>
  <link rel="stylesheet" href="vendor/diff2html.min.css">
  <script src="vendor/diff2html.min.js"></script>
  <!-- xterm.js terminal emulator -->
  <link rel="stylesheet" href="vendor/xterm.css">
  <script src="vendor/xterm.js"></script>
  <script src="vendor/xterm-addon-fit.js"></script>
  <!-- App-specific styles are isolated from vendor CSS. -->
  <link rel="stylesheet" href="styles/app.css">
</head>
<body class="h-screen" style="background:var(--bg);display:grid;grid-template-columns:1fr;grid-template-rows:1fr;">

  <!-- Left pane: session list and global search controls. -->
  <div id="sessionListPane" class="macos-sidebar" style="display:grid;grid-template-rows:auto auto 1fr auto;overflow:hidden;">
    <!-- Titlebar drag area -->
    <div data-tauri-drag-region class="titlebar-drag" style="height:38px;"></div>
    <!-- Search + new button -->
    <div class="px-3 pb-2" style="display:grid;grid-template-columns:1fr auto;gap:6px;align-items:center;">
      <div style="position:relative;min-width:0;">
        <input id="search" type="text" class="mac-input px-3" spellcheck="false" autocorrect="off" autocapitalize="off" autocomplete="off" style="height:28px;min-width:0;width:100%;padding-right:24px;">
        <button id="searchClearBtn" class="search-clear-btn" style="display:none;" type="button">&times;</button>
      </div>
      <button id="newSessionBtn" class="mac-btn" style="width:28px;height:28px;padding:0;" title="New Session">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5l0 14"/><path d="M5 12l14 0"/></svg>
      </button>
      <button id="archiveSelectedBtn" class="invisible mac-btn text-xs w-full" style="font-size:11px;grid-column:1/-1;">
        <span data-i18n="archiveSelected"></span>
      </button>
      <!-- Project filter chip (shown when a project filter is active). -->
      <div id="searchChipBar" style="display:none;grid-column:1/-1;"></div>
    </div>
    <!-- Session list mount point (fully rendered by app.ts). -->
    <div class="overflow-y-auto scrollbar-thin px-2 pb-3" style="min-height:0;">
      <div id="sessionList" class="space-y-0.5"></div>
    </div>
    <!-- Last update indicator -->
    <div id="lastUpdateBar" class="px-3 py-1" style="font-size:10px;color:var(--text-faint);border-top:0.5px solid var(--border);text-align:right;flex-shrink:0;"></div>
    <!-- Hidden elements for state -->
    <input type="checkbox" id="showArchived" class="hidden">
    <h2 id="sessionListTitle" class="hidden"></h2>
  </div>

  <!-- Resize handle -->
  <div id="resizeHandle" class="resize-handle" style="display:none;"></div>

  <!-- Right pane: selected session detail, built dynamically from message data. -->
  <div id="detailPane" style="display:none;grid-template-rows:38px auto 1fr auto;min-width:0;height:100vh;overflow:hidden;">
    <div data-tauri-drag-region class="titlebar-drag" style="background:var(--bg-surface);"></div>
    <div id="detailHeader" class="px-4" style="display:grid;grid-template-rows:auto;gap:4px;padding-bottom:8px;border-bottom:0.5px solid var(--border);background:var(--bg-surface);"></div>
    <div id="detailMessages" class="overflow-y-auto scrollbar-thin px-4 py-4" style="background:var(--bg-chat);display:grid;place-items:center;min-height:0;overflow-x:hidden;">
      <p id="emptyState" class="text-sm" style="color:var(--text-faint);" data-i18n="selectSession"></p>
    </div>
    <!-- Terminal resize handle -->
    <div id="terminalResizeHandle" class="terminal-resize-handle" style="display:none;"></div>
    <!-- Embedded terminal (xterm.js) -->
    <div id="terminalContainer" style="display:none;min-height:0;overflow:hidden;"></div>
    <!-- Footer with action buttons -->
    <div id="detailFooter" class="p-4" style="display:grid;grid-auto-flow:column;grid-auto-columns:max-content;justify-content:end;gap:8px;align-items:center;border-top:0.5px solid var(--border);background:var(--bg-surface);"></div>
  </div>

  <!-- Toast -->
  <div id="toast" class="fixed bottom-6 right-6 rounded px-4 py-2 text-sm shadow-lg hidden fade-in"
    style="background:var(--toast-bg);border:1px solid var(--toast-border);color:var(--toast-text);"></div>


<!-- Entry point compiled from frontend/ts/app.ts -->
<script type="module" src="js/app.js"></script>
</body>
</html>
