<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>README</title>
  <script src="vendor/markdown-it.min.js"></script>
  <script src="vendor/purify.min.js"></script>
  <script src="vendor/highlight.min.js"></script>
  <script src="vendor/hljs-bash.min.js"></script>
  <script src="vendor/hljs-json.min.js"></script>
  <script src="vendor/hljs-python.min.js"></script>
  <script src="vendor/hljs-javascript.min.js"></script>
  <script src="vendor/hljs-typescript.min.js"></script>
  <script src="vendor/hljs-css.min.js"></script>
  <script src="vendor/hljs-xml.min.js"></script>
  <script src="vendor/hljs-yaml.min.js"></script>
  <script src="vendor/hljs-sql.min.js"></script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans", Helvetica, Arial, sans-serif; font-size: 16px; line-height: 1.5; color: #1f2328; background: #fff; max-width: 860px; margin: 0 auto; padding: 32px 40px; word-wrap: break-word; }
    @media (prefers-color-scheme: dark) { body { color: #e6edf3; background: #0d1117; } a { color: #58a6ff; } code { background: #161b22; } pre { background: #161b22 !important; } blockquote { border-color: #3b434b; color: #9198a1; } table th, table td { border-color: #30363d; } hr { background: #30363d; } h1, h2 { border-color: #30363d; } table tr:nth-child(2n) { background: #161b22; } details { border-color: #30363d; } .task-list-item input[type="checkbox"] { accent-color: #58a6ff; } }
    h1, h2, h3, h4, h5, h6 { margin-top: 24px; margin-bottom: 16px; font-weight: 600; line-height: 1.25; }
    h1 { font-size: 2em; padding-bottom: 0.3em; border-bottom: 1px solid #d1d9e0; }
    h2 { font-size: 1.5em; padding-bottom: 0.3em; border-bottom: 1px solid #d1d9e0; }
    h3 { font-size: 1.25em; }
    a { color: #0969da; text-decoration: none; }
    a:hover { text-decoration: underline; }
    code { padding: 0.2em 0.4em; font-size: 85%; background: #f6f8fa; border-radius: 6px; font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace; }
    pre { padding: 16px; overflow: auto; font-size: 85%; line-height: 1.45; background: #f6f8fa !important; border-radius: 6px; }
    pre code { padding: 0; background: transparent; font-size: 100%; }
    blockquote { margin: 0; padding: 0 1em; color: #656d76; border-left: 0.25em solid #d1d9e0; }
    table { border-collapse: collapse; width: 100%; }
    table th, table td { padding: 6px 13px; border: 1px solid #d1d9e0; }
    table tr:nth-child(2n) { background: #f6f8fa; }
    img { max-width: 100%; }
    hr { height: 0.25em; padding: 0; margin: 24px 0; background: #d1d9e0; border: 0; border-radius: 2px; }
    ul, ol { padding-left: 2em; }
    li + li { margin-top: 0.25em; }
    details { border: 1px solid #d1d9e0; border-radius: 6px; padding: 8px 16px; margin: 8px 0; }
    details summary { cursor: pointer; font-weight: 600; }
    details[open] summary { margin-bottom: 8px; }
    .task-list-item { list-style: none; margin-left: -1.5em; }
    .task-list-item input[type="checkbox"] { margin-right: 0.5em; vertical-align: middle; }
    kbd { display: inline-block; padding: 3px 5px; font-size: 11px; line-height: 10px; color: #1f2328; vertical-align: middle; background: #f6f8fa; border: 1px solid #d1d9e0; border-radius: 6px; box-shadow: inset 0 -1px 0 #d1d9e0; }
    .loading { display: flex; align-items: center; justify-content: center; height: 60vh; color: #656d76; font-size: 14px; }
  </style>
</head>
<body>
  <div class="loading" id="loading">Loading...</div>
  <script>
    // README viewer: receives raw markdown + projectPath via Tauri event
    (function() {
      var md = window.markdownit({
        html: true, breaks: false, linkify: true,
        highlight: function(str, lang) {
          if (lang && hljs.getLanguage(lang)) {
            try { return hljs.highlight(str, { language: lang }).value; } catch(e) {}
          }
          try { return hljs.highlightAuto(str).value; } catch(e) {}
          return '';
        }
      });

      // GitHub-style task list checkboxes
      md.core.ruler.after('inline', 'task-list', function(state) {
        var tokens = state.tokens;
        for (var i = 0; i < tokens.length; i++) {
          if (tokens[i].type !== 'inline') continue;
          var children = tokens[i].children;
          if (!children || children.length === 0) continue;
          var first = children[0];
          if (first.type !== 'text') continue;
          if (/^\[x\]\s/i.test(first.content)) {
            first.content = first.content.slice(4);
            var cb = new state.Token('html_inline', '', 0);
            cb.content = '<input type="checkbox" checked disabled> ';
            children.unshift(cb);
            // Mark parent li
            for (var j = i - 1; j >= 0; j--) {
              if (tokens[j].type === 'list_item_open') {
                tokens[j].attrJoin('class', 'task-list-item');
                break;
              }
            }
          } else if (/^\[ \]\s/.test(first.content)) {
            first.content = first.content.slice(4);
            var cb2 = new state.Token('html_inline', '', 0);
            cb2.content = '<input type="checkbox" disabled> ';
            children.unshift(cb2);
            for (var k = i - 1; k >= 0; k--) {
              if (tokens[k].type === 'list_item_open') {
                tokens[k].attrJoin('class', 'task-list-item');
                break;
              }
            }
          }
        }
      });

      var projectPath = '';

      var tauri = window.__TAURI__;
      if (tauri && tauri.event) {
        tauri.event.listen('load-readme', function(event) {
          var payload = event.payload;
          var raw = payload.content;
          projectPath = payload.projectPath || '';

          // Allow GitHub-compatible HTML tags in DOMPurify
          var rendered = DOMPurify.sanitize(md.render(raw), {
            ADD_TAGS: ['details', 'summary', 'kbd', 'input', 'picture', 'source'],
            ADD_ATTR: ['type', 'checked', 'disabled', 'open', 'align', 'media', 'srcset']
          });

          var container = document.createElement('div');
          container.innerHTML = rendered; // Content sanitized by DOMPurify above
          document.getElementById('loading').remove();
          document.body.appendChild(container);
        });
        // Notify Rust that we're ready to receive content
        tauri.event.emit('readme-ready');
      }

      // Link click handler: http(s) -> browser, # -> scroll, relative -> open file
      document.addEventListener('click', function(e) {
        var a = e.target.closest('a');
        if (!a) return;
        var href = a.getAttribute('href');
        if (!href) return;

        e.preventDefault();

        if (/^https?:\/\//.test(href)) {
          // Open URL in default browser via Rust
          if (tauri && tauri.core) {
            tauri.core.invoke('open_path', { path: href });
          }
        } else if (href.startsWith('#')) {
          // Anchor link: scroll to element
          var id = decodeURIComponent(href.slice(1));
          var target = document.getElementById(id);
          if (target) target.scrollIntoView({ behavior: 'smooth' });
        } else if (projectPath) {
          var fullPath = projectPath.replace(/\/$/, '') + '/' + href;
          if (/\.(?:md|markdown|txt)$/i.test(href)) {
            // Markdown file: load in same window via Rust command
            if (tauri && tauri.core) {
              tauri.core.invoke('get_project_readme_by_path', { path: fullPath }).then(function(content) {
                if (content) {
                  var rendered = DOMPurify.sanitize(md.render(content), {
                    ADD_TAGS: ['details', 'summary', 'kbd', 'input', 'picture', 'source'],
                    ADD_ATTR: ['type', 'checked', 'disabled', 'open', 'align', 'media', 'srcset']
                  });
                  var container = document.createElement('div');
                  container.innerHTML = rendered;
                  document.body.replaceChildren(container);
                  window.scrollTo(0, 0);
                }
              });
            }
          } else if (tauri && tauri.core) {
            // Other files: open with OS default
            tauri.core.invoke('open_path', { path: fullPath });
          }
        }
      });
    })();
  </script>
</body>
</html>
