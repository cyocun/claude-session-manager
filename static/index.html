<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claude Sessions</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/markdown-it@14/dist/markdown-it.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11/build/styles/github-dark-dimmed.min.css" id="hljs-theme-dark">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11/build/styles/github.min.css" id="hljs-theme-light">
  <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11/build/highlight.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11/build/languages/bash.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11/build/languages/diff.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11/build/languages/json.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11/build/languages/python.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11/build/languages/javascript.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11/build/languages/typescript.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11/build/languages/css.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11/build/languages/xml.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11/build/languages/yaml.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11/build/languages/sql.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/diff@7/dist/diff.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/diff2html@3/bundles/css/diff2html.min.css">
  <script src="https://cdn.jsdelivr.net/npm/diff2html@3/bundles/js/diff2html.min.js"></script>
  <style>
    html, body { height: 100%; margin: 0; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    .scrollbar-thin::-webkit-scrollbar { width: 5px; }
    .scrollbar-thin::-webkit-scrollbar-track { background: transparent; }
    .scrollbar-thin::-webkit-scrollbar-thumb { border-radius: 3px; }
    .fade-in { animation: fadeIn 0.15s ease-in; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    /* --- Light theme --- */
    :root {
      --bg: #fafafa; --bg-surface: #ffffff; --bg-chat: #f5f5f5;
      --border: #eee; --border-strong: #ddd;
      --text: #333; --text-secondary: #666; --text-muted: #999; --text-faint: #bbb; --text-ghost: #ccc; --text-dot: #ddd;
      --input-bg: #f5f5f5; --input-border: #e5e5e5; --input-text: #333; --input-placeholder: #bbb;
      --btn-bg: #f0f0f0; --btn-bg-hover: #e8e8e8; --btn-border: #ddd; --btn-text: #555;
      --btn2-bg: #f5f5f5; --btn2-bg-hover: #eee; --btn2-border: #e5e5e5; --btn2-text: #888;
      --item-hover: #f8f8f8; --item-active: #f0f0f0; --item-active-border: #ddd;
      --bubble-user-bg: #333; --bubble-user-text: #f5f5f5; --bubble-user-border: transparent;
      --bubble-ai-bg: #fff; --bubble-ai-text: #333; --bubble-ai-border: #e5e5e5;
      --code-bg: #f5f5f5; --code-border: #e5e5e5; --code-bg-user: #2a2a2a; --code-border-user: #444;
      --inline-code-bg: rgba(0,0,0,0.06); --inline-code-bg-user: rgba(255,255,255,0.12);
      --blockquote-border: #ccc; --blockquote-color: #888;
      --table-border: #ddd; --table-th-bg: #f0f0f0;
      --link-color: #555; --link-color-user: #ccc;
      --tool-text: #bbb; --scrollbar: #ccc;
      --toast-bg: #fff; --toast-border: #e0e0e0; --toast-text: #555;
      --hit-bg: #fde68a; --hit-active-bg: #f59e0b; --hit-active-text: #fff;
      --updated-dot: #3b82f6; --updated-bg: rgba(59,130,246,0.04);
      --modal-overlay: rgba(0,0,0,0.3); --modal-bg: #fff; --modal-border: #e5e5e5;
    }
    /* --- Dark theme --- */
    .dark {
      --bg: #0e0e0e; --bg-surface: #161616; --bg-chat: #111;
      --border: #222; --border-strong: #3a3a3a;
      --text: #ddd; --text-secondary: #aaa; --text-muted: #777; --text-faint: #666; --text-ghost: #555; --text-dot: #444;
      --input-bg: #1a1a1a; --input-border: #333; --input-text: #ccc; --input-placeholder: #666;
      --btn-bg: #222; --btn-bg-hover: #2a2a2a; --btn-border: #3a3a3a; --btn-text: #bbb;
      --btn2-bg: #1a1a1a; --btn2-bg-hover: #222; --btn2-border: #333; --btn2-text: #999;
      --item-hover: #1a1a1a; --item-active: #222; --item-active-border: #3a3a3a;
      --bubble-user-bg: #2a2a2a; --bubble-user-text: #eee; --bubble-user-border: #3a3a3a;
      --bubble-ai-bg: #1a1a1a; --bubble-ai-text: #ccc; --bubble-ai-border: #333;
      --code-bg: #141414; --code-border: #333; --code-bg-user: #333; --code-border-user: #444;
      --inline-code-bg: rgba(255,255,255,0.08); --inline-code-bg-user: rgba(255,255,255,0.14);
      --blockquote-border: #555; --blockquote-color: #999;
      --table-border: #3a3a3a; --table-th-bg: #222;
      --link-color: #8ab4f8; --link-color-user: #a5c8ff;
      --tool-text: #666; --scrollbar: #444;
      --toast-bg: #222; --toast-border: #3a3a3a; --toast-text: #ccc;
      --hit-bg: #78350f; --hit-active-bg: #f59e0b; --hit-active-text: #fff;
      --updated-dot: #60a5fa; --updated-bg: rgba(96,165,250,0.06);
      --modal-overlay: rgba(0,0,0,0.6); --modal-bg: #1e1e1e; --modal-border: #3a3a3a;
    }
    body { background: var(--bg); color: var(--text); }
    .scrollbar-thin::-webkit-scrollbar-thumb { background: var(--scrollbar); }

    .bubble-user { background: var(--bubble-user-bg); color: var(--bubble-user-text); border: 1px solid var(--bubble-user-border); border-radius: 16px 16px 4px 16px; max-width: 75%; }
    .bubble-assistant { background: var(--bubble-ai-bg); color: var(--bubble-ai-text); border: 1px solid var(--bubble-ai-border); border-radius: 16px 16px 16px 4px; max-width: 75%; }

    .md-content p { margin: 0.3em 0; }
    .md-content p:first-child { margin-top: 0; }
    .md-content p:last-child { margin-bottom: 0; }
    .md-content pre { background: var(--code-bg); border: 1px solid var(--code-border); border-radius: 6px; padding: 0.6em 0.8em; margin: 0.4em 0; overflow-x: auto; font-size: 0.8em; }
    .bubble-user .md-content pre { background: var(--code-bg-user); border-color: var(--code-border-user); }
    .md-content code { font-family: 'SF Mono', Menlo, monospace; font-size: 0.9em; }
    .md-content :not(pre) > code { background: var(--inline-code-bg); padding: 0.15em 0.35em; border-radius: 3px; }
    .bubble-user .md-content :not(pre) > code { background: var(--inline-code-bg-user); }
    .md-content ul, .md-content ol { margin: 0.3em 0; padding-left: 1.4em; }
    .md-content li { margin: 0.15em 0; }
    .md-content h1, .md-content h2, .md-content h3 { font-weight: 600; margin: 0.5em 0 0.2em; }
    .md-content h1 { font-size: 1.1em; } .md-content h2 { font-size: 1.0em; } .md-content h3 { font-size: 0.95em; }
    .md-content blockquote { border-left: 2px solid var(--blockquote-border); padding-left: 0.8em; margin: 0.3em 0; color: var(--blockquote-color); }
    .md-content table { border-collapse: collapse; margin: 0.4em 0; font-size: 0.85em; }
    .md-content th, .md-content td { border: 1px solid var(--table-border); padding: 0.3em 0.6em; }
    .md-content th { background: var(--table-th-bg); font-weight: 600; }
    .md-content a { color: var(--link-color); text-decoration: underline; }
    .bubble-user .md-content a { color: var(--link-color-user); }
    .md-content strong { font-weight: 600; }

    mark.chat-hit { background: var(--hit-bg); color: var(--text); border-radius: 2px; padding: 0 1px; }
    mark.chat-hit-active { background: var(--hit-active-bg); color: var(--hit-active-text); }

    .tool-block { background: var(--code-bg); border: 1px solid var(--code-border); border-radius: 6px; margin: 4px 0; font-size: 0.75rem; overflow: hidden; }
    /* diff2html overrides */
    .tool-body .d2h-wrapper { font-size: 11px; }
    .tool-body .d2h-file-header, .tool-body .d2h-file-list { display: none; }
    .tool-body .d2h-code-linenumber,
    .tool-body .d2h-code-side-linenumber { width: 1px; min-width: 1px; padding: 0 2px; font-size: 0; color: transparent; }
    .tool-body .d2h-wrapper .d2h-file-diff { border: none; }
    .dark .d2h-wrapper { background: var(--code-bg); }
    .dark .d2h-code-line, .dark .d2h-code-side-line { background: var(--code-bg); color: var(--text); }
    .dark .d2h-code-line-ctn { color: var(--text); }
    .dark .d2h-del { background-color: rgba(248,81,73,0.15); }
    .dark .d2h-ins { background-color: rgba(63,185,80,0.15); }
    .dark .d2h-del .d2h-code-line-ctn del { background-color: rgba(248,81,73,0.3); }
    .dark .d2h-ins .d2h-code-line-ctn ins { background-color: rgba(63,185,80,0.3); }
    .dark .d2h-code-linenumber { background: var(--code-bg); color: var(--text-muted); border-color: var(--code-border); }
    .dark .d2h-file-diff .d2h-diff-table { border-color: var(--code-border); }
    .dark .d2h-emptyplaceholder { background: var(--code-bg); border-color: var(--code-border); }
    .tool-header { display: flex; align-items: center; gap: 6px; padding: 4px 8px; cursor: pointer; user-select: none; }
    .tool-header:hover { background: var(--item-hover); }
    .tool-label { font-weight: 600; color: var(--text-secondary); font-family: 'SF Mono', Menlo, monospace; }
    .tool-desc { color: var(--text-muted); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .tool-chevron { color: var(--text-muted); font-size: 10px; flex-shrink: 0; transition: transform 0.15s; }
    .tool-chevron.open { transform: rotate(90deg); }
    .tool-body { display: none; padding: 6px 8px; border-top: 1px solid var(--code-border); }
    .tool-body.open { display: block; }
    .tool-body pre { margin: 0; white-space: pre-wrap; word-break: break-all; font-family: 'SF Mono', Menlo, monospace; font-size: 0.8em; color: var(--text); background: transparent !important; padding: 0 !important; }
    .tool-body pre code.hljs { background: transparent !important; padding: 0 !important; }
    .tool-result-output { max-height: 200px; overflow-y: auto; opacity: 0.7; }

    .project-group { margin-bottom: 4px; border-top: 1px solid var(--border); padding-top: 6px; }
    .project-group:first-child { border-top: none; padding-top: 0; }
    .project-group-header {
      display: flex; align-items: center; gap: 6px; padding: 8px 8px; cursor: pointer;
      user-select: none; border-radius: 6px; transition: background 0.1s;
    }
    .project-group-header:hover { background: var(--item-hover); }
    .project-group-icon { font-size: 13px; flex-shrink: 0; }
    .project-group-chevron { font-size: 9px; color: var(--text-muted); transition: transform 0.15s; flex-shrink: 0; width: 12px; text-align: center; }
    .project-group-chevron.open { transform: rotate(90deg); }
    .project-group-sessions { display: none; padding-left: 4px; }
    .project-group-sessions.open { display: block; }
    .show-older-pill {
      display: block; margin: 6px auto; padding: 3px 14px; border-radius: 999px;
      font-size: 11px; cursor: pointer; transition: background 0.1s;
      background: var(--btn-bg); color: var(--text-muted); border: 1px solid var(--border);
    }
    .show-older-pill:hover { background: var(--btn-bg-hover); }

    .session-preview {
      position: fixed; z-index: 200; pointer-events: none;
      width: 360px; max-height: 300px; overflow: hidden;
      background: var(--modal-bg); border: 1px solid var(--modal-border);
      border-radius: 8px; padding: 10px 12px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.15);
      font-size: 12px; line-height: 1.5;
    }
    .dark .session-preview { box-shadow: 0 8px 24px rgba(0,0,0,0.5); }
    .session-preview .preview-msg {
      padding: 4px 8px; margin: 2px 0; border-radius: 8px; max-height: 60px;
      overflow: hidden; text-overflow: ellipsis;
    }
    .session-preview .preview-user {
      background: var(--bubble-user-bg); color: var(--bubble-user-text);
      border-radius: 10px 10px 2px 10px; margin-left: 40px;
    }
    .session-preview .preview-assistant {
      background: var(--bubble-ai-bg); color: var(--bubble-ai-text);
      border: 1px solid var(--bubble-ai-border);
      border-radius: 10px 10px 10px 2px; margin-right: 40px;
    }
    .session-preview .preview-fade {
      position: absolute; bottom: 0; left: 0; right: 0; height: 30px;
      background: linear-gradient(transparent, var(--modal-bg));
    }

    .resize-handle {
      width: 4px; cursor: col-resize; flex-shrink: 0;
      background: var(--border); transition: background 0.15s;
    }
    .resize-handle:hover, .resize-handle.active { background: var(--text-muted); }

    .sidebar-toggle {
      position: absolute; left: 0; top: 50%; transform: translateY(-50%);
      width: 20px; height: 40px; display: flex; align-items: center; justify-content: center;
      cursor: pointer; z-index: 10; font-size: 10px;
      background: var(--bg-surface); border: 1px solid var(--border);
      border-left: none; border-radius: 0 6px 6px 0;
      color: var(--text-muted);
    }
    .sidebar-toggle:hover { color: var(--text); }

    .settings-popover {
      position: absolute; top: 100%; right: 0; margin-top: 6px; z-index: 100;
      background: var(--modal-bg); border: 1px solid var(--modal-border);
      border-radius: 8px; padding: 1rem 1.2rem; min-width: 280px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.15);
    }
    .dark .settings-popover { box-shadow: 0 8px 24px rgba(0,0,0,0.5); }
  </style>
</head>
<body class="h-screen flex flex-col">

  <!-- Header -->
  <header class="flex-shrink-0 border-b z-50" style="background:var(--bg-surface);border-color:var(--border);">
    <div class="w-full px-5 py-3 flex items-center justify-between">
      <h1 class="text-sm font-medium tracking-wide" style="color:var(--text-muted);">CLAUDE SESSIONS</h1>
      <div class="flex items-center gap-3">
        <div class="relative">
          <span class="absolute left-2.5 top-1/2 -translate-y-1/2 text-xs" style="color:var(--text-faint);">&#x1F50D;</span>
          <input id="search" type="text"
            class="rounded pl-8 pr-3 py-1.5 text-sm w-64 focus:outline-none transition"
            style="background:var(--input-bg);border:1px solid var(--input-border);color:var(--input-text);">
        </div>
        <label class="flex items-center gap-1.5 text-xs cursor-pointer select-none" style="color:var(--text-muted);">
          <input type="checkbox" id="showArchived" class="rounded" style="border-color:var(--border-strong);">
          <span data-i18n="showArchived"></span>
        </label>
        <!-- Settings gear -->
        <div class="relative">
          <button id="settingsBtn" class="text-xl w-8 h-8 flex items-center justify-center rounded hover:opacity-70 transition" style="color:var(--text-secondary);" title="Settings">&#x2699;</button>
          <!-- Popover -->
          <div id="settingsPopover" class="settings-popover hidden">
            <div class="mb-3">
              <label class="text-xs font-medium block mb-1" style="color:var(--text-secondary);" data-i18n="theme"></label>
              <select id="themeSelect" class="w-full rounded px-2.5 py-1.5 text-sm focus:outline-none"
                style="background:var(--input-bg);border:1px solid var(--input-border);color:var(--input-text);">
                <option value="system" data-i18n-option="themeSystem"></option>
                <option value="light" data-i18n-option="themeLight"></option>
                <option value="dark" data-i18n-option="themeDark"></option>
              </select>
            </div>
            <div class="mb-3">
              <label class="text-xs font-medium block mb-1" style="color:var(--text-secondary);" data-i18n="terminalApp"></label>
              <select id="terminalAppSelect" class="w-full rounded px-2.5 py-1.5 text-sm focus:outline-none"
                style="background:var(--input-bg);border:1px solid var(--input-border);color:var(--input-text);">
                <option value="Terminal">Terminal.app</option>
                <option value="iTerm">iTerm2</option>
                <option value="Warp">Warp</option>
                <option value="tmux">tmux</option>
                <option value="Ghostty">Ghostty</option>
              </select>
            </div>
            <div>
              <label class="text-xs font-medium block mb-1" style="color:var(--text-secondary);" data-i18n="language"></label>
              <select id="langSelect" class="w-full rounded px-2.5 py-1.5 text-sm focus:outline-none"
                style="background:var(--input-bg);border:1px solid var(--input-border);color:var(--input-text);">
                <option value="ja">日本語</option>
                <option value="en">English</option>
              </select>
            </div>
          </div>
        </div>
      </div>
    </div>
  </header>

  <div class="flex flex-1 min-h-0 relative">

    <!-- Sidebar: Projects -->
    <aside id="sidebar" class="w-64 overflow-y-auto scrollbar-thin flex-shrink-0 transition-all duration-200" style="border-right:1px solid var(--border);background:var(--bg-surface);">
      <div class="p-3">
        <button id="allProjectsBtn"
          class="w-full text-left px-3 py-2 rounded text-sm font-medium transition mb-1" data-i18n="allProjects">
        </button>
        <div id="projectList" class="space-y-0.5"></div>
      </div>
    </aside>

    <!-- Sidebar toggle (visible when sidebar is hidden) -->
    <div id="sidebarToggle" class="sidebar-toggle hidden">&#x25B6;</div>

    <!-- Session List -->
    <div id="sessionListPane" class="flex-1 min-w-0 overflow-y-auto scrollbar-thin" style="background:var(--bg-surface);">
      <div class="p-4">
        <div class="flex items-center justify-between mb-3 h-7">
          <h2 id="sessionListTitle" class="text-xs font-medium" style="color:var(--text-muted);"></h2>
          <button id="archiveSelectedBtn"
            class="invisible text-xs px-3 py-1 rounded transition"
            style="color:var(--btn2-text);background:var(--btn-bg);">
            <span data-i18n="archiveSelected"></span>
          </button>
        </div>
        <div id="sessionList" class="space-y-0.5"></div>
      </div>
    </div>

    <!-- Resize handle -->
    <div id="resizeHandle" class="resize-handle hidden"></div>

    <!-- Detail Pane -->
    <div id="detailPane" class="hidden flex-col flex-shrink-0">
      <div id="detailHeader" class="flex-shrink-0 px-4 py-2" style="border-bottom:1px solid var(--border);background:var(--bg-surface);"></div>
      <div id="detailMessages" class="flex-1 min-h-0 overflow-y-auto scrollbar-thin px-4 py-4" style="background:var(--bg-chat);"></div>
      <!-- Footer with action buttons -->
      <div id="detailFooter" class="flex-shrink-0 px-4 py-2 flex items-center justify-end gap-2" style="border-top:1px solid var(--border);background:var(--bg-surface);"></div>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast" class="fixed bottom-6 right-6 rounded px-4 py-2 text-sm shadow-lg hidden fade-in"
    style="background:var(--toast-bg);border:1px solid var(--toast-border);color:var(--toast-text);"></div>


<script>
// --- i18n ---

    minsAgo: '分前',
    hoursAgo: '時間前',
    daysAgo: '日前',
    archiveProject: 'プロジェクトをアーカイブ',
  },
  en: {

    resumeTerminal: 'Resume (Terminal)',

// --- State ---
const API = '';
let sessions = [];
let projects = [];
let selectedProject = null;
let selectedSession = null;
let selectedIds = new Set();
let serverSettings = {};
let projectNameMap = {}; // path -> display name
// Stores projects the user has explicitly toggled open/closed
let toggledProjects = new Set(JSON.parse(localStorage.getItem('csm-toggled') || '[]'));
// Stores projects where "show older" has been clicked
let showAllSessions = new Set();
let openedAt = Date.now();
let knownTimestamps = {}; // sessionId -> lastTimestamp at first load
let isFirstLoad = true;

function createEl(tag, attrs = {}, children = []) {
  const el = document.createElement(tag);
  for (const [k, v] of Object.entries(attrs)) {
    if (k === 'className') el.className = v;
    else if (k === 'textContent') el.textContent = v;
    else if (k.startsWith('on')) el.addEventListener(k.slice(2).toLowerCase(), v);
    else el.setAttribute(k, v);
  }
  for (const child of children) {
    if (typeof child === 'string') el.appendChild(document.createTextNode(child));
    else if (child) el.appendChild(child);
  }
  return el;
}

async function fetchSessions(includeArchived = false) {
  const res = await fetch(API + '/api/sessions?include_archived=' + includeArchived);
  sessions = await res.json();
  if (isFirstLoad) {
    sessions.forEach(s => { knownTimestamps[s.sessionId] = s.lastTimestamp; });
    isFirstLoad = false;
  }
  renderSessions();
}
function isUpdatedSession(s) {
  if (!(s.sessionId in knownTimestamps)) return true; // new session
  return s.lastTimestamp > knownTimestamps[s.sessionId]; // timestamp changed
}
async function fetchProjects() {
  const res = await fetch(API + '/api/projects');
  projects = await res.json();
  projectNameMap = {};
  projects.forEach(p => { if (p.name) projectNameMap[p.path] = p.name; });
  renderProjects();
}
async function fetchDetail(sessionId) {
  const res = await fetch(API + '/api/sessions/' + sessionId);
  return await res.json();
}
async function fetchSettings() {
  const res = await fetch(API + '/api/settings');
  serverSettings = await res.json();
}

function shortPath(p) {
  return p.replace(/^\/Users\/[^/]+\//, '~/').replace(/^~\/Dropbox\/__WORKS\//, '');
}
function shortPathElements(p) {
  const short = shortPath(p);
  const lastSlash = short.lastIndexOf('/');
  if (lastSlash === -1) return [null, short];
  return [short.slice(0, lastSlash + 1), short.slice(lastSlash + 1)];
}
function projectDisplayName(path) {
  return projectNameMap[path] || shortPath(path).split('/').pop() || shortPath(path);
}
function isRemote() {
  return location.hostname !== 'localhost' && location.hostname !== '127.0.0.1';
}
function timeAgo(ts) {
  if (!ts) return '';
  const diff = Date.now() - ts;
  const mins = Math.floor(diff / 60000);
  if (mins < 1) return t('justNow');
  if (mins < 60) return mins + t('minsAgo');
  const hours = Math.floor(mins / 60);
  if (hours < 24) return hours + t('hoursAgo');
  const days = Math.floor(hours / 24);
  if (days < 30) return days + t('daysAgo');
  return new Date(ts).toLocaleDateString(lang === 'ja' ? 'ja-JP' : 'en-US');
}

function renderProjects() {

  el.replaceChildren();
  projects.forEach(p => {

    const nameSpan = createEl('span', { className: 'truncate' });
    if (hasCustomName) {
      const n = createEl('span', { className: 'font-medium', textContent: displayName });

      nameSpan.appendChild(n);
    } else {

      const t = createEl('span', { className: 'font-medium', textContent: tail }); t.style.color = 'var(--text-secondary)'; nameSpan.appendChild(t);
    }

    const countSpan = createEl('span', { className: 'text-[10px] flex-shrink-0 ml-2', textContent: String(p.sessionCount) });

function highlightProject() {
  document.querySelectorAll('.project-btn').forEach(b => {
    b.style.background = 'transparent';
  });
  if (selectedProject) {
    const active = document.querySelector('.project-btn[data-path="' + CSS.escape(selectedProject) + '"]');
    if (active) active.style.background = 'var(--btn-bg)';
  }
  const allBtn = document.getElementById('allProjectsBtn');
  allBtn.style.background = selectedProject ? 'transparent' : 'var(--btn-bg)';
  allBtn.style.color = selectedProject ? 'var(--text-secondary)' : 'var(--text)';
}

const SEVEN_DAYS = 7 * 24 * 60 * 60 * 1000;

function isRecentProject(g) {
  return (Date.now() - g.sessions[0].lastTimestamp) < SEVEN_DAYS;
}

function isProjectOpen(g) {
  // User explicitly toggled -> respect that
  if (toggledProjects.has(g.path)) {
    // toggled means: flip the default
    // default open = recent, default closed = old
    return !isRecentProject(g);
  }
  // Default: open if recent
  return isRecentProject(g);
}

function saveToggled() {
  localStorage.setItem('csm-toggled', JSON.stringify([...toggledProjects]));
}

function renderSessionItem(s) {
  const cb = createEl('input', {
    type: 'checkbox',
    className: 'session-check mt-1 rounded flex-shrink-0',
    'data-id': s.sessionId,
    onChange: (e) => {
      if (e.target.checked) selectedIds.add(s.sessionId);
      else selectedIds.delete(s.sessionId);
      const ab = document.getElementById('archiveSelectedBtn');
      ab.classList.toggle('invisible', selectedIds.size === 0);
      ab.classList.toggle('visible', selectedIds.size > 0);
    }
  });
  cb.style.borderColor = 'var(--border-strong)';
  if (selectedIds.has(s.sessionId)) cb.checked = true;

  const firstMsg = createEl('p', { className: 'text-sm leading-snug truncate', textContent: s.firstDisplay });
  firstMsg.style.color = 'var(--text)';
  const lastMsg = (s.lastDisplay && s.lastDisplay !== s.firstDisplay)
    ? createEl('p', { className: 'text-xs leading-snug truncate mt-0.5', textContent: s.lastDisplay })
    : null;
  if (lastMsg) lastMsg.style.color = 'var(--text-muted)';

  const dot = () => { const sp = createEl('span', { className: 'text-[10px] flex-shrink-0', textContent: '·' }); sp.style.color = 'var(--text-dot)'; return sp; };
  const meta = (txt) => { const sp = createEl('span', { className: 'text-[10px] flex-shrink-0', textContent: txt }); sp.style.color = 'var(--text-faint)'; return sp; };
  const metaParts = [meta(timeAgo(s.lastTimestamp)), dot(), meta(s.messageCount + t('msg'))];
  if (s.archived) { const sp = createEl('span', { className: 'text-[10px] flex-shrink-0', textContent: t('archived') }); sp.style.color = 'var(--text-faint)'; metaParts.push(sp); }

  const updated = isUpdatedSession(s);

  const metaDiv = createEl('div', { className: 'flex items-center gap-2 mt-1 overflow-hidden' }, metaParts);
  const textDiv = createEl('div', { className: 'flex-1 min-w-0 overflow-hidden' }, [firstMsg, lastMsg, metaDiv].filter(Boolean));

  const rowChildren = [cb];
  if (updated) {
    const updDot = createEl('span', { className: 'flex-shrink-0 mt-1.5' });
    updDot.style.cssText = 'width:7px;height:7px;border-radius:50%;background:var(--updated-dot);';
    rowChildren.push(updDot);
  }
  rowChildren.push(textDiv);
  const row = createEl('div', { className: 'flex items-start gap-2 overflow-hidden' }, rowChildren);

  const isActive = selectedSession === s.sessionId;
  const defaultBg = updated ? 'var(--updated-bg)' : 'transparent';
  const item = createEl('div', {
    className: 'session-item p-3 rounded cursor-pointer transition border overflow-hidden',
    'data-id': s.sessionId,
    onClick: (e) => {
      if (e.target.tagName === 'INPUT') return;
      selectedSession = s.sessionId;
      // Mark as seen
      knownTimestamps[s.sessionId] = s.lastTimestamp;
      renderSessions();
      showDetail(s.sessionId);
    }
  }, [row]);
  item.style.borderColor = isActive ? 'var(--item-active-border)' : 'transparent';
  item.style.background = isActive ? 'var(--item-active)' : defaultBg;
  if (s.archived) item.style.opacity = '0.4';
  item.addEventListener('mouseenter', () => {
    if (!isActive) item.style.background = 'var(--item-hover)';
    clearTimeout(previewTimer);
    previewTimer = setTimeout(() => {
      showPreview(s.sessionId, item.getBoundingClientRect());
    }, 400);
  });
  item.addEventListener('mouseleave', () => {
    if (!isActive) item.style.background = defaultBg;
    clearTimeout(previewTimer);
    hidePreview();
  });
  return item;
}

function renderSessions() {
  const search = document.getElementById('search').value.toLowerCase();
  let filtered = sessions;
  if (selectedProject) filtered = filtered.filter(s => s.project === selectedProject);
  if (search) filtered = filtered.filter(s =>
    (s.firstDisplay || '').toLowerCase().includes(search) ||
    (s.lastDisplay || '').toLowerCase().includes(search) ||
    s.project.toLowerCase().includes(search) ||
    (projectNameMap[s.project] || '').toLowerCase().includes(search)
  );

  document.getElementById('sessionListTitle').textContent =
    filtered.length + ' ' + t('sessions') + (selectedProject ? ' — ' + projectDisplayName(selectedProject) : '');

  const archBtn = document.getElementById('archiveSelectedBtn');
  archBtn.classList.toggle('invisible', selectedIds.size === 0);
  archBtn.classList.toggle('visible', selectedIds.size > 0);

  const el = document.getElementById('sessionList');
  el.replaceChildren();

  // When a specific project is selected, render flat list
  if (selectedProject) {
    filtered.forEach(s => el.appendChild(renderSessionItem(s)));
    return;
  }

  // Group by project, maintaining order of first appearance (already sorted by lastTimestamp)
  const groups = [];
  const groupMap = {};
  filtered.forEach(s => {
    if (!groupMap[s.project]) {
      groupMap[s.project] = { path: s.project, sessions: [] };
      groups.push(groupMap[s.project]);
    }
    groupMap[s.project].sessions.push(s);
  });

  groups.forEach(g => {
    const open = isProjectOpen(g);
    const group = createEl('div', { className: 'project-group' });

    // Group header
    const chevron = createEl('span', { className: 'project-group-chevron' + (open ? ' open' : ''), textContent: '\u25B6' });
    const name = createEl('span', { className: 'text-xs font-medium flex-1 truncate', textContent: projectDisplayName(g.path) });
    name.style.color = 'var(--text-secondary)';
    const count = createEl('span', { className: 'text-[10px] flex-shrink-0', textContent: g.sessions.length + '' });
    count.style.color = 'var(--text-ghost)';

    const icon = createEl('span', { className: 'project-group-icon', textContent: '\uD83D\uDCE6' });
    const header = createEl('div', { className: 'project-group-header' }, [icon, chevron, name, count]);
    if (projectNameMap[g.path]) header.title = shortPath(g.path);

    // Split sessions into recent (7 days) and older
    const now = Date.now();
    const recentSessions = g.sessions.filter(s => (now - s.lastTimestamp) < SEVEN_DAYS);
    const olderSessions = g.sessions.filter(s => (now - s.lastTimestamp) >= SEVEN_DAYS);

    const sessionsDiv = createEl('div', { className: 'project-group-sessions' + (open ? ' open' : '') });

    // Always show recent sessions
    recentSessions.forEach(s => sessionsDiv.appendChild(renderSessionItem(s)));

    // "Show older" button or older sessions
    if (olderSessions.length > 0) {
      if (showAllSessions.has(g.path)) {
        olderSessions.forEach(s => sessionsDiv.appendChild(renderSessionItem(s)));
      } else {
        const showOlderBtn = createEl('button', {
          className: 'show-older-pill',
          textContent: (lang === 'ja' ? '古いセッションを表示' : 'Show older') + ' (' + olderSessions.length + ')',
          onClick: (e) => {
            e.stopPropagation();
            showAllSessions.add(g.path);
            renderSessions();
          }
        });
        sessionsDiv.appendChild(showOlderBtn);
      }
    }

    // If no recent sessions and not showing all, show a hint
    if (recentSessions.length === 0 && !showAllSessions.has(g.path)) {
      const hint = createEl('p', { className: 'text-[11px] px-3 py-1.5', textContent: lang === 'ja' ? '最近のセッションなし' : 'No recent sessions' });
      hint.style.color = 'var(--text-faint)';
      sessionsDiv.insertBefore(hint, sessionsDiv.firstChild);
    }

    header.addEventListener('click', (e) => {
      if (e.metaKey || e.ctrlKey) {
        // Cmd+click: toggle all projects
        const allChevrons = document.querySelectorAll('.project-group-chevron');
        const allSessions = document.querySelectorAll('.project-group-sessions');
        const shouldOpen = !chevron.classList.contains('open');
        allChevrons.forEach(c => c.classList.toggle('open', shouldOpen));
        allSessions.forEach(s => s.classList.toggle('open', shouldOpen));
        // Reset toggle state
        toggledProjects.clear();
        if (!shouldOpen) {
          // All closed: mark recent ones as toggled (since default is open for recent)
          groups.forEach(gg => { if (isRecentProject(gg)) toggledProjects.add(gg.path); });
        } else {
          // All open: mark old ones as toggled (since default is closed for old)
          groups.forEach(gg => { if (!isRecentProject(gg)) toggledProjects.add(gg.path); });
        }
        saveToggled();
        return;
      }
      if (toggledProjects.has(g.path)) toggledProjects.delete(g.path);
      else toggledProjects.add(g.path);
      saveToggled();
      chevron.classList.toggle('open');
      sessionsDiv.classList.toggle('open');
    });

    group.appendChild(header);
    group.appendChild(sessionsDiv);
    el.appendChild(group);
  });
}

async function showDetail(sessionId) {

  pane.classList.remove('hidden');
  pane.classList.add('flex');

  document.getElementById('sidebarToggle').classList.remove('hidden');
  document.getElementById('resizeHandle').classList.remove('hidden');

  messagesEl.replaceChildren();

  const [detailPrefix, detailTail] = shortPathElements(detail.project);

    onClick: (e) => { e.stopPropagation(); navigator.clipboard.writeText(sessionId); showToast(lang === 'ja' ? 'IDをコピーしました' : 'ID copied'); }
  });
  idLine.style.color = 'var(--text-faint)';

  const mkBtn = (text, style, onClick) => {
    const btn = createEl('button', { className: 'text-xs px-3 py-1.5 rounded transition flex-shrink-0', textContent: text, onClick });
    btn.style.cssText = style;
    return btn;
  };

  // Chat search controls
  const searchIcon = createEl('span', { className: 'text-[10px]', textContent: '\uD83D\uDD0D' });
  searchIcon.style.color = 'var(--text-faint)';
  const chatSearchInput = createEl('input', {
    type: 'text', id: 'chatSearch',
    className: 'rounded pl-2 pr-2 py-0.5 text-xs focus:outline-none transition',
  });
  chatSearchInput.style.cssText = 'background:var(--input-bg);border:1px solid var(--input-border);color:var(--input-text);width:140px;';
  chatSearchInput.placeholder = t('chatSearchPlaceholder');
  const chatCount = createEl('span', { id: 'chatSearchCount', className: 'text-[10px] flex-shrink-0 w-12 text-center' });
  chatCount.style.color = 'var(--text-muted)';
  const prevBtn = createEl('button', { id: 'chatSearchPrev', className: 'text-[10px] px-1 py-0.5 rounded transition', textContent: '\u25B2' });
  prevBtn.style.color = 'var(--text-muted)';
  const nextBtn = createEl('button', { id: 'chatSearchNext', className: 'text-[10px] px-1 py-0.5 rounded transition', textContent: '\u25BC' });
  nextBtn.style.color = 'var(--text-muted)';

  // Single row: path | id | spacer | search
  const headerRow = createEl('div', { className: 'flex items-center gap-2 min-w-0' }, [
    pathLine, idLine,
    createEl('span', { className: 'flex-1' }),
    searchIcon, chatSearchInput, chatCount, prevBtn, nextBtn,
  ]);

  headerEl.replaceChildren(headerRow);

  // Re-bind chat search events
  chatSearchInput.addEventListener('input', doChatSearch);
  nextBtn.addEventListener('click', chatSearchNext);
  prevBtn.addEventListener('click', chatSearchPrev);
  chatSearchInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') { e.shiftKey ? chatSearchPrev() : chatSearchNext(); e.preventDefault(); }
    if (e.key === 'Escape') { e.target.value = ''; doChatSearch(); e.target.blur(); }
  });

  // Footer buttons
  const footerEl = document.getElementById('detailFooter');
  const sessionUpdated = isUpdatedSession(sessions.find(s => s.sessionId === sessionId) || {});
  const resumeStyle = sessionUpdated
    ? 'color:#fff;background:var(--updated-dot);border:1px solid var(--updated-dot);font-weight:600;'
    : 'color:var(--btn-text);background:var(--btn-bg);border:1px solid var(--btn-border);';
  const resumeOpenBtn = mkBtn(
    '▶ ' + (isRemote() ? t('resumeCopy') : t('resumeTerminal')),
    resumeStyle,
    () => isRemote() ? copyResume(sessionId) : resumeInTerminal(sessionId),
  );
  const resumeCopyBtn = mkBtn('📋 ' + t('copyCmd'), 'color:var(--btn2-text);background:var(--btn2-bg);border:1px solid var(--btn2-border);', () => copyResume(sessionId));
  const archiveBtn = mkBtn('📥 ' + t('archive'), 'color:var(--text-muted);background:var(--btn2-bg);border:1px solid var(--btn2-border);', () => archiveSingle(sessionId));
  footerEl.replaceChildren(resumeOpenBtn, resumeCopyBtn, archiveBtn);

  // Chat messages
  messagesEl.replaceChildren();
  const chatContainer = createEl('div', { className: 'flex flex-col gap-3 fade-in' });

  // Build a global result map across all messages (tool_use in assistant, tool_result in next user msg)
  const globalResultMap = {};
  detail.messages.forEach(m => {
    if (m.tools) {
      m.tools.filter(t => t.name === '_result').forEach(t => { globalResultMap[t.id] = t; });
    }
  });

  detail.messages.forEach(m => {
    const hasText = m.content && m.content !== '[Tool Result]' && !m.content.startsWith('[Tool:');
    const hasTools = m.tools && m.tools.length > 0;
    if (!hasText && !hasTools) return;

    const isUser = m.type === 'user';

    // Tool blocks (rendered between messages or attached to assistant messages)
    if (hasTools) {
      const toolEls = renderToolBlocks(m.tools, globalResultMap);
      if (toolEls.length > 0) {
        if (hasText) {
          // Show text bubble first, then tools
          const bubbleInner = createEl('div', { className: 'md-content text-sm leading-relaxed break-words' });
          bubbleInner.innerHTML = renderMarkdown(m.content);
          const bubble = createEl('div', { className: (isUser ? 'bubble-user' : 'bubble-assistant') + ' px-4 py-2.5' }, [bubbleInner]);
          chatContainer.appendChild(createEl('div', { className: 'flex ' + (isUser ? 'justify-end' : 'justify-start') }, [bubble]));
        }
        toolEls.forEach(te => chatContainer.appendChild(te));
        return;
      }
    }

    if (!hasText) return;

    const bubbleInner = createEl('div', { className: 'md-content text-sm leading-relaxed break-words' });
    bubbleInner.innerHTML = renderMarkdown(m.content);
    const bubble = createEl('div', { className: (isUser ? 'bubble-user' : 'bubble-assistant') + ' px-4 py-2.5' }, [bubbleInner]);
    chatContainer.appendChild(createEl('div', { className: 'flex ' + (isUser ? 'justify-end' : 'justify-start') }, [bubble]));
  });

  messagesEl.appendChild(chatContainer);
  requestAnimationFrame(() => { messagesEl.scrollTop = messagesEl.scrollHeight; });
}

// --- Session preview popover ---

const previewCache = {};
let previewEl = null;
let previewTimer = null;
let previewSessionId = null;

function initPreview() {
  previewEl = document.createElement('div');
  previewEl.className = 'session-preview hidden';
  document.body.appendChild(previewEl);
}

function showPreview(sessionId, anchorRect) {
  if (previewSessionId === sessionId && !previewEl.classList.contains('hidden')) return;
  previewSessionId = sessionId;

  // Position
  const x = anchorRect.right + 8;
  const y = anchorRect.top;
  previewEl.style.left = Math.min(x, window.innerWidth - 380) + 'px';
  previewEl.style.top = Math.min(y, window.innerHeight - 320) + 'px';

  if (previewCache[sessionId]) {
    renderPreview(previewCache[sessionId]);
    return;
  }

  previewEl.classList.remove('hidden');
  previewEl.replaceChildren(createEl('span', { className: 'text-xs', textContent: '...' }));

  fetch(API + '/api/sessions/' + sessionId).then(r => r.json()).then(detail => {
    previewCache[sessionId] = detail;
    if (previewSessionId === sessionId) renderPreview(detail);
  });
}

function renderPreview(detail) {
  previewEl.classList.remove('hidden');
  previewEl.replaceChildren();

  // Show last ~6 meaningful messages
  const msgs = detail.messages.filter(m =>
    m.content && m.content !== '[Tool Result]' && !m.content.startsWith('[Tool:')
  );
  const recent = msgs.slice(-6);

  recent.forEach(m => {
    const isUser = m.type === 'user';
    const div = document.createElement('div');
    div.className = 'preview-msg ' + (isUser ? 'preview-user' : 'preview-assistant');
    div.textContent = m.content.slice(0, 120) + (m.content.length > 120 ? '...' : '');
    previewEl.appendChild(div);
  });

  const fade = document.createElement('div');
  fade.className = 'preview-fade';
  previewEl.appendChild(fade);
}

function hidePreview() {
  previewSessionId = null;
  if (previewEl) previewEl.classList.add('hidden');
}

// --- Tool rendering ---

function guessLang(filePath) {
  if (!filePath) return null;
  const ext = filePath.split('.').pop().toLowerCase();
  const map = {
    js: 'javascript', jsx: 'javascript', ts: 'typescript', tsx: 'typescript',
    py: 'python', rb: 'ruby', rs: 'rust', go: 'go', java: 'java',
    css: 'css', scss: 'css', html: 'xml', htm: 'xml', vue: 'xml', svelte: 'xml',
    json: 'json', yaml: 'yaml', yml: 'yaml', toml: 'ini',
    sh: 'bash', zsh: 'bash', bash: 'bash',
    sql: 'sql', md: 'markdown', swift: 'swift', kt: 'kotlin',
  };
  return map[ext] || null;
}

function highlightCode(text, lang) {
  if (lang && hljs.getLanguage(lang)) {
    try { return hljs.highlight(text, { language: lang }).value; } catch {}
  }
  try { return hljs.highlightAuto(text).value; } catch {}
  return null;
}

function makeHighlightedPre(text, lang) {
  const pre = document.createElement('pre');
  const code = document.createElement('code');
  code.className = 'hljs' + (lang ? ' language-' + lang : '');
  const highlighted = highlightCode(text, lang);
  if (highlighted) {
    code.innerHTML = DOMPurify.sanitize(highlighted);
  } else {
    code.textContent = text;
  }
  pre.appendChild(code);
  return pre;
}

function renderToolBlocks(tools, externalResultMap) {
  const els = [];
  // Merge local results (same message) and external results (from next user message)
  const resultMap = { ...(externalResultMap || {}) };
  tools.filter(t => t.name === '_result').forEach(t => { resultMap[t.id] = t; });

  tools.filter(t => t.name !== '_result').forEach(tool => {
    const result = resultMap[tool.id];
    const block = document.createElement('div');
    block.className = 'tool-block';

    let summary = '';
    let bodyEl = null;
    let isDiff = false;
    let diffFile = '', diffOld = '', diffNew = '';
    let lang = null;

    if (tool.name === 'Bash') {
      summary = tool.description || tool.command || 'bash';
      bodyEl = makeHighlightedPre('$ ' + (tool.command || ''), 'bash');
    } else if (tool.name === 'Edit') {
      const fname = (tool.file || '').split('/').pop();
      summary = 'Edit ' + fname;
      isDiff = true;
      diffFile = tool.file || fname;
      diffOld = tool.old || '';
      diffNew = tool.new || '';
    } else if (tool.name === 'Write') {
      const fname = (tool.file || '').split('/').pop();
      summary = 'Write ' + fname;
      lang = guessLang(tool.file);
      bodyEl = makeHighlightedPre(tool.content || '', lang);
    } else if (tool.name === 'Read') {
      const fname = (tool.file || '').split('/').pop();
      summary = 'Read ' + fname;
    } else if (tool.name === 'Glob' || tool.name === 'Grep') {
      summary = tool.name + ' ' + (tool.pattern || '');
    } else {
      summary = tool.name;
      if (tool.input) bodyEl = makeHighlightedPre(JSON.stringify(tool.input, null, 2), 'json');
    }

    // Header
    const chevron = createEl('span', { className: 'tool-chevron', textContent: '\u25B6' });
    const label = createEl('span', { className: 'tool-label', textContent: tool.name });
    const desc = createEl('span', { className: 'tool-desc', textContent: summary });
    const header = createEl('div', { className: 'tool-header' }, [chevron, label, desc]);

    // Body
    const body = document.createElement('div');
    body.className = 'tool-body';
    let hasBody = false;

    if (isDiff) {
      const unifiedPatch = Diff.createPatch(diffFile, diffOld, diffNew, '', '', { context: 3 });
      const diffContainer = document.createElement('div');
      const outputType = 'side-by-side';
      const diffHtml = Diff2Html.html(unifiedPatch, {
        drawFileList: false,
        outputFormat: outputType,
        matching: 'words',
        highlight: true,
      });
      diffContainer.innerHTML = DOMPurify.sanitize(diffHtml);
      body.appendChild(diffContainer);
      hasBody = true;
    } else if (bodyEl) {
      body.appendChild(bodyEl);
      hasBody = true;
    }

    if (result && result.output) {
      if (hasBody) {
        const sep = document.createElement('hr');
        sep.style.cssText = 'border:none;border-top:1px solid var(--code-border);margin:4px 0;';
        body.appendChild(sep);
      }
      const outputPre = makeHighlightedPre(result.output, 'bash');
      outputPre.className += ' tool-result-output';
      body.appendChild(outputPre);
      hasBody = true;
    }

    header.addEventListener('click', () => {
      chevron.classList.toggle('open');
      body.classList.toggle('open');
    });

    block.appendChild(header);
    if (hasBody) block.appendChild(body);
    els.push(block);
  });
  return els;
}

// --- Actions ---

async function resumeInTerminal(sessionId) {
  const res = await fetch(API + '/api/resume/' + sessionId, { method: 'POST' });
  const data = await res.json();
  if (!data.ok) {
    showToast(t('toastError') + (data.error || ''));
  } else if (data.method === 'activated' || data.method === 'activated-app') {
    showToast(lang === 'ja' ? '実行中のウィンドウをアクティブにしました' : 'Activated existing window');
  } else {
    showToast(data.method + t('toastResumed'));
  }
}
async function copyResume(sessionId) {
  const res = await fetch(API + '/api/resume-command/' + sessionId);
  const data = await res.json();
  await navigator.clipboard.writeText(data.command);
  showToast(t('toastCopied'));
}
async function archiveSingle(sessionId) {
  await fetch(API + '/api/archive', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ session_ids: [sessionId], archive: true }) });
  showToast(t('toastArchived'));
  await fetchSessions(document.getElementById('showArchived').checked);
}
async function archiveSelected() {
  if (selectedIds.size === 0) return;
  const count = selectedIds.size;
  await fetch(API + '/api/archive', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ session_ids: [...selectedIds], archive: true }) });
  showToast(count + t('toastArchivedN'));
  selectedIds.clear();
  document.getElementById('archiveSelectedBtn').classList.add('invisible');
  await fetchSessions(document.getElementById('showArchived').checked);
}
async function archiveProject(projectPath) {
  const projectSessions = sessions.filter(s => s.project === projectPath).map(s => s.sessionId);
  if (projectSessions.length === 0) return;
  await fetch(API + '/api/archive', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ session_ids: projectSessions, archive: true }) });
  showToast(projectSessions.length + t('toastArchivedN'));
  await fetchSessions(document.getElementById('showArchived').checked);
}

function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.remove('hidden');
  setTimeout(() => el.classList.add('hidden'), 2000);
}

// --- Chat search ---

let chatHits = [];
let chatHitIndex = -1;

function doChatSearch() {
  const q = document.getElementById('chatSearch').value.trim();
  const countEl = document.getElementById('chatSearchCount');
  const messagesEl = document.getElementById('detailMessages');
  messagesEl.querySelectorAll('mark.chat-hit').forEach(m => {
    const parent = m.parentNode; parent.replaceChild(document.createTextNode(m.textContent), m); parent.normalize();
  });
  chatHits = []; chatHitIndex = -1;
  if (!q) { countEl.textContent = ''; return; }

  const walker = document.createTreeWalker(messagesEl, NodeFilter.SHOW_TEXT);
  const matches = [];
  let node;
  while (node = walker.nextNode()) {
    const text = node.textContent; const lower = text.toLowerCase(); const qLower = q.toLowerCase();
    let idx = 0;
    while ((idx = lower.indexOf(qLower, idx)) !== -1) { matches.push({ node, start: idx, length: q.length }); idx += q.length; }
  }
  for (let i = matches.length - 1; i >= 0; i--) {
    const m = matches[i]; const range = document.createRange();
    range.setStart(m.node, m.start); range.setEnd(m.node, m.start + m.length);
    const mark = document.createElement('mark'); mark.className = 'chat-hit'; range.surroundContents(mark);
  }
  chatHits = Array.from(messagesEl.querySelectorAll('mark.chat-hit'));
  countEl.textContent = chatHits.length ? chatHits.length + t('hits') : '0' + t('hits');
  if (chatHits.length > 0) { chatHitIndex = 0; activateChatHit(); }
}
function activateChatHit() {
  chatHits.forEach(h => h.classList.remove('chat-hit-active'));
  if (chatHitIndex >= 0 && chatHitIndex < chatHits.length) {
    const hit = chatHits[chatHitIndex]; hit.classList.add('chat-hit-active'); smoothScrollTo(hit);
    document.getElementById('chatSearchCount').textContent = (chatHitIndex + 1) + '/' + chatHits.length;
  }
}
function smoothScrollTo(el) {
  const container = document.getElementById('detailMessages');
  const target = el.offsetTop - container.offsetTop - container.clientHeight / 2 + el.clientHeight / 2;
  const start = container.scrollTop; const distance = target - start; const duration = 200;
  let startTime = null;
  function step(timestamp) {
    if (!startTime) startTime = timestamp;
    const progress = Math.min((timestamp - startTime) / duration, 1);
    const ease = 1 - Math.pow(1 - progress, 3);
    container.scrollTop = start + distance * ease;
    if (progress < 1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}
function chatSearchNext() { if (!chatHits.length) return; chatHitIndex = (chatHitIndex + 1) % chatHits.length; activateChatHit(); }
function chatSearchPrev() { if (!chatHits.length) return; chatHitIndex = (chatHitIndex - 1 + chatHits.length) % chatHits.length; activateChatHit(); }

// --- Settings modal ---

function toggleSettings() {
  document.getElementById('settingsPopover').classList.toggle('hidden');
}
function closeSettings() {
  document.getElementById('settingsPopover').classList.add('hidden');
}

// --- Resize handle ---

(function() {
  const handle = document.getElementById('resizeHandle');
  const detail = document.getElementById('detailPane');
  const container = detail.parentElement;
  let dragging = false;

  handle.addEventListener('mousedown', (e) => {
    e.preventDefault();
    dragging = true;
    handle.classList.add('active');
    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';
  });

  document.addEventListener('mousemove', (e) => {
    if (!dragging) return;
    const rect = container.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const totalW = rect.width;
    const detailW = totalW - x;
    const minW = 300;
    const maxW = totalW - 200;
    const clamped = Math.max(minW, Math.min(maxW, detailW));
    detail.style.width = clamped + 'px';
  });

  document.addEventListener('mouseup', () => {
    if (!dragging) return;
    dragging = false;
    handle.classList.remove('active');
    document.body.style.cursor = '';
    document.body.style.userSelect = '';
  });
})();

// --- Sidebar toggle ---

document.getElementById('sidebarToggle').addEventListener('click', () => {
  const sidebar = document.getElementById('sidebar');
  sidebar.classList.remove('hidden');
  document.getElementById('sidebarToggle').classList.add('hidden');
});

// --- Init ---

document.getElementById('allProjectsBtn').addEventListener('click', () => { selectedProject = null; highlightProject(); renderSessions(); });
document.getElementById('search').addEventListener('input', () => renderSessions());
document.getElementById('showArchived').addEventListener('change', (e) => fetchSessions(e.target.checked));
document.getElementById('archiveSelectedBtn').addEventListener('click', archiveSelected);
// chatSearch events are bound dynamically in showDetail()
document.getElementById('settingsBtn').addEventListener('click', (e) => { e.stopPropagation(); toggleSettings(); });
document.addEventListener('click', (e) => {
  const pop = document.getElementById('settingsPopover');
  if (!pop.classList.contains('hidden') && !pop.contains(e.target) && e.target.id !== 'settingsBtn') closeSettings();
});

document.getElementById('themeSelect').addEventListener('change', (e) => {
  themePref = e.target.value; localStorage.setItem('csm-theme', themePref); applyTheme();
});
document.getElementById('langSelect').addEventListener('change', (e) => {
  lang = e.target.value; localStorage.setItem('csm-lang', lang); applyI18n(); renderSessions(); renderProjects();
});
document.getElementById('terminalAppSelect').addEventListener('change', async (e) => {
  await fetch(API + '/api/settings', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ terminalApp: e.target.value }) });
});

// Restore saved state
document.getElementById('themeSelect').value = themePref;
document.getElementById('langSelect').value = lang;

applyTheme();
applyI18n();
highlightProject();
initPreview();

Promise.all([fetchSessions(), fetchProjects(), fetchSettings()]).then(() => {
  document.getElementById('terminalAppSelect').value = serverSettings.terminalApp || 'Terminal';
});

// Auto-refresh every 30s to detect updated sessions
setInterval(() => {
  fetchSessions(document.getElementById('showArchived').checked);
}, 30000);
